<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Mis Rutinas - Athlex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
        }
        header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 1000;
            top: 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }
        .navbar {
            height: 70px;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .logo a {
            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .back-btn {
            background-color: #FFD700;
            color: #000;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background-color: #FFC400;
            transform: scale(1.05);
        }
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 50px;
        }
        .page-title {
            font-size: 2.2rem;
            color: #FFD700;
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }
        .page-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #FFD700, transparent);
            border-radius: 3px;
        }
        .membership-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 215, 0, 0.05));
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .membership-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .membership-icon {
            width: 60px;
            height: 60px;
            background: #FFD700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #000;
        }
        .membership-details h3 {
            color: #FFD700;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
        .membership-details p {
            color: #ccc;
            font-size: 0.9rem;
        }
        .membership-badge {
            background: #FFD700;
            color: #000;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .membership-badge.expired {
            background: #ff4444;
            color: white;
        }
        .membership-badge.warning {
            background: #ffaa00;
            color: #000;
        }
        .no-membership {
            background: rgba(255, 68, 68, 0.2);
            border: 2px solid #ff4444;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            width: 100%;
        }
        .no-membership i {
            font-size: 4rem;
            color: #ff4444;
            margin-bottom: 20px;
        }
        .no-membership h3 {
            color: #ff8888;
            margin-bottom: 15px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .stat-box:hover {
            transform: translateY(-5px);
            border-color: #FFD700;
        }
        .stat-box i {
            font-size: 2rem;
            color: #FFD700;
            margin-bottom: 10px;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #FFD700;
        }
        .stat-label {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .filters-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .filters-title {
            color: #FFD700;
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
        }
        .filter-group label {
            color: #FFD700;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-select, .search-input {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .filter-select:focus, .search-input:focus {
            outline: none;
            border-color: #FFD700;
        }
        .routines-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .routine-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .routine-card:hover {
            transform: translateY(-5px);
            border-color: #FFD700;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }
        .card-header {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 215, 0, 0.05));
            padding: 20px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }
        .routine-type {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .type-crossfit { background: rgba(255, 107, 53, 0.2); color: #FF6B35; border: 1px solid rgba(255, 107, 53, 0.3); }
        .type-running { background: rgba(78, 205, 196, 0.2); color: #4ECDC4; border: 1px solid rgba(78, 205, 196, 0.3); }
        .type-hyrox { background: rgba(255, 209, 102, 0.2); color: #FFD166; border: 1px solid rgba(255, 209, 102, 0.3); }
        .type-personalizado { background: rgba(157, 78, 221, 0.2); color: #9D4EDD; border: 1px solid rgba(157, 78, 221, 0.3); }
        .routine-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }
        .routine-date {
            font-size: 0.8rem;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .card-body {
            padding: 20px;
        }
        .instructions-preview {
            color: #ccc;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            line-clamp: 3;
            overflow: hidden;
        }
        .card-footer {
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: flex-end;
        }
        .view-details {
            background: #FFD700;
            color: #000;
            border: none;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .view-details:hover {
            background: #FFC400;
            transform: scale(1.05);
        }
        .loading-container {
            text-align: center;
            padding: 60px;
        }
        .loading-spinner {
            font-size: 3rem;
            color: #FFD700;
            margin-bottom: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 2px dashed rgba(255, 215, 0, 0.3);
        }
        .empty-icon {
            font-size: 4rem;
            color: rgba(255, 215, 0, 0.3);
            margin-bottom: 20px;
        }
        .routine-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .routine-modal-container {
            background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 215, 0, 0.3);
            position: relative;
        }
        .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4444;
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
        }
        .modal-header {
            border-left: 4px solid #FFD700;
            padding-left: 15px;
            margin-bottom: 20px;
        }
        .modal-title {
            color: #FFD700;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .modal-instructions {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            white-space: pre-line;
            line-height: 1.6;
        }
        @media (max-width: 768px) {
            .navbar { padding: 0 15px; }
            .membership-card { flex-direction: column; text-align: center; }
            .membership-info { justify-content: center; }
            .routines-grid { grid-template-columns: 1fr; }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo"><a href="dashboard-crossfit.html"><i class="fas fa-dumbbell"></i> Jean Trainer</a></div>
            <button class="back-btn" onclick="window.location.href='dashboard-crossfit.html'"><i class="fas fa-arrow-left"></i> Regresar</button>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">MIS RUTINAS</h1>
        <div id="membershipInfo" class="membership-card"><div class="loading-container" style="padding:20px;"><div class="loading-spinner" style="font-size:1.5rem;"><i class="fas fa-spinner"></i></div><p>Cargando información de membresía...</p></div></div>
        <div class="stats-grid" id="statsContainer"></div>
        <div class="filters-container"><h3 class="filters-title"><i class="fas fa-filter"></i> Filtrar Rutinas</h3><div class="filters-grid"><div class="filter-group"><label><i class="fas fa-search"></i> Buscar</label><input type="text" id="searchInput" class="search-input" placeholder="Nombre de la rutina..."></div><div class="filter-group"><label><i class="fas fa-sort-amount-down"></i> Ordenar</label><select id="sortSelect" class="filter-select"><option value="reciente">Más reciente</option><option value="antiguo">Más antiguo</option><option value="nombre_asc">Nombre (A-Z)</option><option value="nombre_desc">Nombre (Z-A)</option></select></div></div></div>
        <div id="routinesContainer"><div class="loading-container"><div class="loading-spinner"><i class="fas fa-spinner"></i></div><p>Cargando tus rutinas...</p></div></div>
    </main>

    <script type="module">
        import { supabase } from '../publico_general/supabaseClient.js';
        
        let supabaseClient = supabase;
        let currentUser = null;
        let userMembership = null;
        let allRoutines = [];
        let filteredRoutines = [];

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
                if (authError || !user) { 
                    window.location.href = '../login.html'; 
                    return; 
                }
                currentUser = user;
                console.log('Usuario autenticado:', currentUser.id);
                
                await loadUserMembership();
                await loadRoutines();
                setupEvents();
                
            } catch (error) {
                console.error('Error inicial:', error);
                document.getElementById('routinesContainer').innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div><h3>Error al cargar las rutinas</h3><button class="view-details" onclick="location.reload()">Reintentar</button></div>`;
            }
        });

        async function loadUserMembership() {
            try {
                // Obtener membresía del usuario (activa o no)
                const { data: membresia, error: membError } = await supabaseClient
                    .from('membresias')
                    .select('*')
                    .eq('id_usuario', currentUser.id)
                    .order('created_at', { ascending: false })
                    .limit(1)
                    .maybeSingle();
                
                if (membError && membError.code !== 'PGRST116') throw membError;
                
                if (!membresia) {
                    userMembership = null;
                    document.getElementById('membershipInfo').innerHTML = `<div class="no-membership"><i class="fas fa-exclamation-triangle"></i><h3>No tienes una membresía activa</h3><p>Debes adquirir una membresía para acceder a las rutinas</p><button class="view-details" onclick="window.location.href='../pagos/pagar-membresia.html'" style="margin-top:15px;"><i class="fas fa-credit-card"></i> Adquirir Membresía</button></div>`;
                    return;
                }
                
                userMembership = membresia;
                console.log('Membresía encontrada:', userMembership);
                
                // Obtener nombre del plan desde catalogo_planes
                let nombreMembresia = userMembership.tipo || 'Plan';
                let icono = '🏋️';
                let estadoColor = '#FFD700';
                let estadoTexto = 'ACTIVA';
                let diasRestantes = 0;
                let badgeClass = '';
                
                try {
                    const { data: plan } = await supabaseClient
                        .from('catalogo_planes')
                        .select('nombre')
                        .eq('tipo', userMembership.tipo)
                        .single();
                    if (plan) nombreMembresia = plan.nombre;
                } catch(e) {
                    console.log('No se encontró el plan en catálogo:', userMembership.tipo);
                }
                
                // Calcular días restantes
                if (userMembership.fecha_expiracion) {
                    const expiracion = new Date(userMembership.fecha_expiracion);
                    const hoy = new Date();
                    diasRestantes = Math.ceil((expiracion - hoy) / (1000*60*60*24));
                    
                    if (diasRestantes < 0) {
                        estadoTexto = 'VENCIDA';
                        estadoColor = '#ff4444';
                        badgeClass = 'expired';
                    } else if (diasRestantes <= 7) {
                        estadoTexto = `PRÓXIMO A VENCER (${diasRestantes} días)`;
                        estadoColor = '#ffaa00';
                        badgeClass = 'warning';
                    } else {
                        estadoTexto = `ACTIVA (${diasRestantes} días restantes)`;
                        estadoColor = '#00ff00';
                    }
                }
                
                // Asignar icono según el tipo de plan
                if (nombreMembresia.toLowerCase().includes('crossfit')) icono = '🏋️';
                else if (nombreMembresia.toLowerCase().includes('running')) icono = '🏃';
                else if (nombreMembresia.toLowerCase().includes('hyrox')) icono = '💪';
                else if (nombreMembresia.toLowerCase().includes('premium')) icono = '⭐';
                
                document.getElementById('membershipInfo').innerHTML = `
                    <div class="membership-info">
                        <div class="membership-icon">${icono}</div>
                        <div class="membership-details">
                            <h3>${nombreMembresia}</h3>
                            <p><i class="fas fa-calendar-alt"></i> ${new Date(userMembership.fecha_inscrito).toLocaleDateString('es-ES')}</p>
                            ${userMembership.fecha_expiracion ? `<p><i class="fas fa-clock"></i> Expira: ${new Date(userMembership.fecha_expiracion).toLocaleDateString('es-ES')}</p>` : ''}
                        </div>
                    </div>
                    <div class="membership-badge ${badgeClass}" style="background:${estadoColor};">
                        <i class="fas ${diasRestantes < 0 ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i>
                        ${estadoTexto}
                    </div>
                `;
                
            } catch (error) {
                console.error('Error cargando membresía:', error);
            }
        }

        async function loadRoutines() {
            try {
                if (!userMembership) {
                    console.log('No hay membresía, no se cargan rutinas');
                    return;
                }
                
                console.log('Llamando a obtener_rutinas_por_membresia con usuario:', currentUser.id);
                
                const { data: rutinas, error: rutinasError } = await supabaseClient
                    .rpc('obtener_rutinas_por_membresia', { p_usuario_id: currentUser.id });
                
                if (rutinasError) {
                    console.error('Error RPC:', rutinasError);
                    throw rutinasError;
                }
                
                console.log('Rutinas obtenidas:', rutinas);
                
                allRoutines = rutinas || [];
                filteredRoutines = [...allRoutines];
                
                if (allRoutines.length === 0) {
                    console.log('No se encontraron rutinas para este usuario');
                }
                
                updateStats();
                displayRoutines();
                
            } catch (error) {
                console.error('Error cargando rutinas:', error);
                await loadRoutinesFallback();
            }
        }

        async function loadRoutinesFallback() {
            try {
                console.log('Usando fallback - cargando todas las rutinas');
                const { data: rutinas, error } = await supabaseClient
                    .from('rutinas')
                    .select('*')
                    .order('fecha_inicio', { ascending: false });
                
                if (error) throw error;
                
                allRoutines = rutinas || [];
                filteredRoutines = [...allRoutines];
                updateStats();
                displayRoutines();
                
            } catch (error) {
                console.error('Error en fallback:', error);
                document.getElementById('routinesContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <h3>No se pudieron cargar las rutinas</h3>
                        <p>${error.message}</p>
                        <button class="view-details" onclick="location.reload()">Reintentar</button>
                    </div>
                `;
            }
        }

        function updateStats() {
            const statsContainer = document.getElementById('statsContainer');
            const tipos = {};
            allRoutines.forEach(r => { 
                const tipo = r.tipo || r.deporte || 'General'; 
                tipos[tipo] = (tipos[tipo] || 0) + 1; 
            });
            
            let statsHTML = `<div class="stat-box"><i class="fas fa-dumbbell"></i><div class="stat-number">${allRoutines.length}</div><div class="stat-label">Total Rutinas</div></div>`;
            
            Object.entries(tipos).slice(0, 3).forEach(([tipo, count]) => {
                let icono = tipo === 'Crossfit' ? '🔥' : tipo === 'Running' ? '🏃' : tipo === 'Hyrox' ? '💪' : '📋';
                statsHTML += `<div class="stat-box"><i class="fas ${icono === '🔥' ? 'fa-fire' : icono === '🏃' ? 'fa-running' : icono === '💪' ? 'fa-medal' : 'fa-clipboard-list'}"></i><div class="stat-number">${count}</div><div class="stat-label">${tipo}</div></div>`;
            });
            
            statsContainer.innerHTML = statsHTML;
        }

        function displayRoutines() {
            const container = document.getElementById('routinesContainer');
            
            if (filteredRoutines.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-clipboard-list"></i></div><h3>No hay rutinas disponibles</h3><p>Según tu membresía, no hay rutinas asignadas actualmente.</p></div>`;
                return;
            }
            
            let routinesHTML = `<div class="routines-grid">`;
            
            filteredRoutines.forEach(routine => {
                let typeClass = 'type-personalizado';
                let typeIcon = '📋';
                let displayType = routine.tipo || routine.deporte || 'General';
                
                if (displayType === 'Crossfit' || routine.deporte === 'crossfit') { 
                    typeClass = 'type-crossfit'; 
                    typeIcon = '🏋️';
                    displayType = 'Crossfit';
                } else if (displayType === 'Running' || routine.deporte === 'running') { 
                    typeClass = 'type-running'; 
                    typeIcon = '🏃';
                    displayType = 'Running';
                } else if (displayType === 'Hyrox' || routine.deporte === 'hyrox') { 
                    typeClass = 'type-hyrox'; 
                    typeIcon = '💪';
                    displayType = 'Hyrox';
                }
                
                let fechaTexto = 'Sin fecha';
                if (routine.fecha_inicio) {
                    const fecha = new Date(routine.fecha_inicio);
                    fechaTexto = fecha.toLocaleDateString('es-ES', { day:'numeric', month:'short', year:'numeric' });
                }
                
                let instruccionesPreview = (routine.instrucciones || 'Sin instrucciones detalladas').substring(0, 120);
                if (instruccionesPreview.length === 120) instruccionesPreview += '...';
                
                routinesHTML += `
                    <div class="routine-card" onclick='showRoutineDetails(${JSON.stringify(routine).replace(/'/g, "\\'")})'>
                        <div class="card-header">
                            <div class="routine-type ${typeClass}">
                                <i class="fas ${typeIcon === '🏋️' ? 'fa-dumbbell' : typeIcon === '🏃' ? 'fa-running' : 'fa-medal'}"></i>
                                ${displayType}
                            </div>
                            <div class="routine-name">${escapeHtml(routine.nombre_rutina)}</div>
                            <div class="routine-date">
                                <i class="fas fa-calendar-alt"></i> ${fechaTexto}
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="instructions-preview">${escapeHtml(instruccionesPreview)}</div>
                        </div>
                        <div class="card-footer">
                            <button class="view-details" onclick="event.stopPropagation(); showRoutineDetails(${JSON.stringify(routine).replace(/'/g, "\\'")})">
                                <i class="fas fa-eye"></i> Ver Rutina
                            </button>
                        </div>
                    </div>
                `;
            });
            
            routinesHTML += `</div>`;
            container.innerHTML = routinesHTML;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.showRoutineDetails = function(routine) {
            const modalHTML = `
                <div class="routine-modal-overlay" id="routineModal" onclick="closeModalIfClickOutside(event)">
                    <div class="routine-modal-container">
                        <button class="modal-close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
                        <div class="modal-header">
                            <h2 class="modal-title">${escapeHtml(routine.nombre_rutina)}</h2>
                            <p><i class="fas fa-tag"></i> ${routine.tipo || routine.deporte || 'General'}</p>
                            ${routine.fecha_inicio ? `<p><i class="fas fa-calendar"></i> ${new Date(routine.fecha_inicio).toLocaleDateString('es-ES')}</p>` : ''}
                        </div>
                        <div class="modal-instructions">
                            <strong><i class="fas fa-list-ol"></i> Instrucciones:</strong>
                            <br><br>
                            ${(routine.instrucciones || 'No hay instrucciones detalladas').replace(/\n/g, '<br>')}
                        </div>
                        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:20px;">
                            <button class="view-details" onclick="closeModal()">Cerrar</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        };

        window.closeModal = function() { 
            document.getElementById('routineModal')?.remove(); 
        };
        
        window.closeModalIfClickOutside = function(event) { 
            if (event.target === event.currentTarget) closeModal(); 
        };

        function filterRoutines() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;
            
            filteredRoutines = allRoutines.filter(r => 
                r.nombre_rutina.toLowerCase().includes(searchTerm)
            );
            
            if (sortBy === 'reciente') {
                filteredRoutines.sort((a,b) => new Date(b.fecha_inicio) - new Date(a.fecha_inicio));
            } else if (sortBy === 'antiguo') {
                filteredRoutines.sort((a,b) => new Date(a.fecha_inicio) - new Date(b.fecha_inicio));
            } else if (sortBy === 'nombre_asc') {
                filteredRoutines.sort((a,b) => a.nombre_rutina.localeCompare(b.nombre_rutina));
            } else if (sortBy === 'nombre_desc') {
                filteredRoutines.sort((a,b) => b.nombre_rutina.localeCompare(a.nombre_rutina));
            }
            
            displayRoutines();
        }

        function setupEvents() {
            document.getElementById('searchInput').addEventListener('input', filterRoutines);
            document.getElementById('sortSelect').addEventListener('change', filterRoutines);
        }
    </script>
</body>
</html>
