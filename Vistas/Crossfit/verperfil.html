<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Mi Perfil - Athlex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Open Sans', sans-serif; }
        body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%); color: #fff; line-height: 1.6; min-height: 100vh; }
        header { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); position: fixed; width: 100%; z-index: 1000; top: 0; border-bottom: 1px solid rgba(255,215,0,0.3); }
        .navbar { height: 70px; max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .logo { font-size: 1.8rem; font-weight: 800; color: #FFD700; text-transform: uppercase; letter-spacing: 1px; }
        .logo a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .back-btn { background: #FFD700; color: #000; border: none; border-radius: 50px; padding: 10px 25px; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .back-btn:hover { background: #FFC400; transform: scale(1.05); }
        .profile-content { max-width: 1200px; margin: 0 auto; padding: 100px 20px 50px; }
        .page-title { font-size: 2.2rem; color: #FFD700; margin-bottom: 20px; text-align: center; position: relative; display: inline-block; left: 50%; transform: translateX(-50%); }
        .page-title::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, #FFD700, transparent); border-radius: 3px; }
        .page-subtitle { font-size: 1rem; color: #aaa; text-align: center; margin-bottom: 40px; }
        .profile-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; margin-bottom: 40px; }
        .avatar-card { background: linear-gradient(145deg, #111, #0a0a0a); border-radius: 20px; padding: 40px 30px; text-align: center; border: 1px solid rgba(255,215,0,0.2); height: fit-content; }
        .avatar-container { width: 120px; height: 120px; margin: 0 auto 25px; }
        .avatar { width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05)); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #FFD700; }
        .avatar i { font-size: 3.5rem; color: #FFD700; }
        .user-role { display: inline-block; background: rgba(255,215,0,0.15); color: #FFD700; padding: 6px 20px; border-radius: 50px; font-weight: 600; font-size: 0.85rem; margin-top: 15px; }
        .info-card { background: linear-gradient(145deg, #111, #0a0a0a); border-radius: 20px; padding: 30px; border: 1px solid rgba(255,215,0,0.2); }
        .info-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,215,0,0.2); }
        .info-header h2 { color: #FFD700; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .edit-btn { background: rgba(255,215,0,0.1); color: #FFD700; border: 1px solid #FFD700; border-radius: 50px; padding: 8px 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
        .edit-btn:hover { background: #FFD700; color: #000; }
        .edit-btn.active { background: #27ae60; border-color: #27ae60; color: white; }
        .profile-form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .form-group { margin-bottom: 5px; }
        .form-group.full-width { grid-column: span 2; }
        .form-group label { display: block; color: #FFD700; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; }
        .form-group label i { margin-right: 6px; width: 18px; }
        .form-control { width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; font-size: 0.9rem; transition: all 0.3s ease; }
        .form-control:focus { outline: none; border-color: #FFD700; background: rgba(255,215,0,0.05); }
        .form-control[readonly] { background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.1); color: #aaa; cursor: not-allowed; }
        select.form-control { cursor: pointer; }
        select.form-control option { background: #1a1a1a; color: #fff; }
        .membership-card { background: rgba(255,215,0,0.05); border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px solid rgba(255,215,0,0.2); grid-column: span 2; }
        .membership-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .membership-header i { font-size: 1.5rem; color: #FFD700; }
        .membership-header h3 { color: #FFD700; font-size: 1.1rem; }
        .membership-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .membership-item .label { color: #aaa; font-size: 0.75rem; margin-bottom: 3px; }
        .membership-item .value { color: #fff; font-size: 0.95rem; font-weight: 600; }
        .status-badge { display: inline-block; padding: 3px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .status-activo { background: rgba(39,174,96,0.2); color: #27ae60; }
        .status-inactivo { background: rgba(231,76,60,0.2); color: #e74c3c; }
        .action-buttons { display: flex; gap: 15px; justify-content: flex-end; margin-top: 20px; grid-column: span 2; }
        .btn { padding: 10px 25px; border-radius: 50px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; border: none; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: #FFD700; color: #000; }
        .btn-primary:hover { background: #FFC400; transform: scale(1.02); }
        .btn-secondary { background: transparent; color: #fff; border: 1px solid #FFD700; }
        .btn-secondary:hover { background: rgba(255,215,0,0.1); }
        .alert { padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; animation: slideIn 0.3s ease; }
        .alert-success { background: rgba(39,174,96,0.15); border: 1px solid #27ae60; color: #27ae60; }
        .alert-error { background: rgba(231,76,60,0.15); border: 1px solid #e74c3c; color: #e74c3c; }
        .loading { text-align: center; padding: 60px; }
        .loading i { font-size: 2.5rem; color: #FFD700; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) {
            .profile-grid { grid-template-columns: 1fr; }
            .profile-form { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .membership-card { grid-column: span 1; }
            .action-buttons { grid-column: span 1; flex-direction: column; }
            .navbar { padding: 0 15px; }
            .profile-content { padding: 90px 15px 30px; }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo"><a href="dashboard-crossfit.html"><i class="fas fa-dumbbell"></i> Jean Trainer</a></div>
            <button class="back-btn" onclick="window.location.href='dashboard-crossfit.html'"><i class="fas fa-arrow-left"></i> Volver</button>
        </div>
    </header>

    <main class="profile-content">
        <h1 class="page-title">Mi Perfil</h1>
        <p class="page-subtitle">Gestiona tu información personal</p>
        <div id="alertContainer"></div>
        <div id="loadingSpinner" class="loading"><i class="fas fa-spinner"></i><p>Cargando perfil...</p></div>

        <div id="profileContainer" style="display: none;">
            <div class="profile-grid">
                <div class="avatar-card">
                    <div class="avatar-container"><div class="avatar"><i class="fas fa-user-circle"></i></div></div>
                    <h3 id="displayName" style="color: #FFD700; font-size: 1.3rem; margin-bottom: 5px;"></h3>
                    <p id="displayEmail" style="color: #ccc; font-size: 0.85rem; margin-bottom: 5px;"></p>
                    <p id="displayCedula" style="color: #aaa; font-size: 0.85rem;"></p>
                    <span class="user-role" id="displayRole"></span>
                </div>

                <div class="info-card">
                    <div class="info-header">
                        <h2><i class="fas fa-id-card"></i> Información Personal</h2>
                        <button class="edit-btn" id="toggleEditBtn"><i class="fas fa-edit"></i> Editar Perfil</button>
                    </div>
                    <form id="profileForm">
                        <div class="profile-form">
                            <div class="form-group">
                                <label><i class="fas fa-id-card"></i> Cédula</label>
                                <input type="text" class="form-control" id="cedula" name="cedula" readonly placeholder="Número de cédula">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Nombre</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" readonly required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> Apellido</label>
                                <input type="text" class="form-control" id="apellido" name="apellido" readonly required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-envelope"></i> Email</label>
                                <input type="email" class="form-control" id="correo" name="correo" readonly required>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-phone"></i> Teléfono</label>
                                <input type="tel" class="form-control" id="telefono" name="telefono" readonly placeholder="+58 XXX-XXXXXXX">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-calendar"></i> Fecha Nacimiento</label>
                                <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento" readonly>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-birthday-cake"></i> Edad</label>
                                <input type="number" class="form-control" id="edad" name="edad" readonly min="16" max="100" placeholder="Años">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-venus-mars"></i> Género</label>
                                <select class="form-control" id="genero" name="genero" readonly disabled>
                                    <option value="">Seleccionar...</option>
                                    <option value="masculino">Masculino</option>
                                    <option value="femenino">Femenino</option>
                                    <option value="otro">Otro</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-tint"></i> Tipo de Sangre</label>
                                <select class="form-control" id="tipo_sangre" name="tipo_sangre" readonly disabled>
                                    <option value="">Seleccionar...</option>
                                    <option value="A+">A+</option><option value="A-">A-</option>
                                    <option value="B+">B+</option><option value="B-">B-</option>
                                    <option value="AB+">AB+</option><option value="AB-">AB-</option>
                                    <option value="O+">O+</option><option value="O-">O-</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-weight-scale"></i> Peso (kg)</label>
                                <input type="number" step="0.01" class="form-control" id="peso" name="peso" readonly min="30" max="300" placeholder="kg">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-ruler"></i> Estatura (cm)</label>
                                <input type="number" step="0.01" class="form-control" id="estatura" name="estatura" readonly min="100" max="250" placeholder="cm">
                            </div>

                            <div class="membership-card" id="membershipContainer">
                                <div class="membership-header"><i class="fas fa-crown"></i><h3>Mi Membresía</h3></div>
                                <div class="membership-details">
                                    <div class="membership-item"><span class="label">Plan Actual</span><span class="value" id="membresiaTipo">-</span></div>
                                    <div class="membership-item"><span class="label">Estado</span><span class="value" id="membresiaEstado">-</span></div>
                                    <div class="membership-item"><span class="label">Fecha Inscripción</span><span class="value" id="membresiaInscripcion">-</span></div>
                                    <div class="membership-item"><span class="label">Próximo Pago</span><span class="value" id="membresiaProximoPago">-</span></div>
                                    <div class="membership-item"><span class="label">Fecha Expiración</span><span class="value" id="membresiaExpiracion">-</span></div>
                                </div>
                            </div>

                            <div class="action-buttons" id="actionButtons" style="display: none;">
                                <button type="button" class="btn btn-secondary" id="cancelEditBtn"><i class="fas fa-times"></i> Cancelar</button>
                                <button type="submit" class="btn btn-primary" id="saveProfileBtn"><i class="fas fa-save"></i> Guardar</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from '../publico_general/supabaseClient.js';

        let isEditing = false;
        let currentUserId = null;
        let userProfile = null;

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const { data: { user }, error: authError } = await supabase.auth.getUser();
                if (authError || !user) { window.location.href = 'login.html'; return; }
                
                currentUserId = user.id;
                console.log('Usuario autenticado:', currentUserId);
                
                await loadUserProfile();
                
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('profileContainer').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                showAlert('Error al cargar el perfil', 'error');
            }
        });

        async function loadUserProfile() {
            try {
                // Cargar datos del usuario
                const { data: profile, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('id_usuario', currentUserId)
                    .single();

                if (error) throw error;
                
                userProfile = profile;
                console.log('Perfil cargado:', profile);

                populateForm(profile);
                await loadUserMembership();

            } catch (error) {
                console.error('Error cargando perfil:', error);
                showAlert('No se pudo cargar el perfil', 'error');
            }
        }

        async function loadUserMembership() {
            try {
                console.log('Cargando membresía para usuario:', currentUserId);
                
                // Consulta directa a la tabla membresias
                const { data: membership, error } = await supabase
                    .from('membresias')
                    .select('*')
                    .eq('id_usuario', currentUserId)
                    .order('created_at', { ascending: false })
                    .limit(1);
                
                console.log('Respuesta membresía:', { membership, error });

                if (error) {
                    console.error('Error en consulta:', error);
                    throw error;
                }
                
                const membresia = membership && membership.length > 0 ? membership[0] : null;
                
                if (membresia) {
                    console.log('Membresía encontrada:', membresia);
                    
                    // Traducir tipo de plan
                    let planDisplay = 'Crossfit Standard';
                    const tipo = membresia.tipo || '';
                    
                    if (tipo === 'running_standard') planDisplay = 'Running Standard';
                    else if (tipo === 'hyrox_standard') planDisplay = 'Hyrox Standard';
                    else if (tipo === 'personalizado') planDisplay = 'Personalizado';
                    else if (tipo === 'premium') planDisplay = 'Premium';
                    else if (tipo.includes('combo')) planDisplay = 'Combo Especial';
                    else if (tipo === 'crossfit_standard') planDisplay = 'Crossfit Standard';
                    else if (tipo === 'crossfit_personalizado') planDisplay = 'Crossfit Personalizado';
                    else if (tipo === 'running_personalizado') planDisplay = 'Running Personalizado';
                    else if (tipo === 'hyrox_personalizado') planDisplay = 'Hyrox Personalizado';
                    else if (tipo === 'crossfit_running_combo') planDisplay = 'Crossfit + Running Combo';
                    else if (tipo === 'running_hyrox_combo') planDisplay = 'Running + Hyrox Combo';
                    else if (tipo === 'hyrox_crossfit_combo') planDisplay = 'Hyrox + Crossfit Combo';
                    else if (tipo === 'triple_combo') planDisplay = 'Triple Combo';
                    
                    document.getElementById('membresiaTipo').textContent = planDisplay;
                    
                    const estado = membresia.estado || 'inactivo';
                    const estadoElement = document.getElementById('membresiaEstado');
                    estadoElement.textContent = estado === 'activo' ? 'Activo' : estado === 'suspendido' ? 'Suspendido' : 'Inactivo';
                    estadoElement.className = 'value status-badge ' + (estado === 'activo' ? 'status-activo' : 'status-inactivo');

                    if (membresia.fecha_inscrito) {
                        document.getElementById('membresiaInscripcion').textContent = new Date(membresia.fecha_inscrito).toLocaleDateString('es-ES');
                    }

                    const fechaPago = membresia.fecha_expiracion || membresia.fecha_siguiente_pago;
                    if (fechaPago) {
                        document.getElementById('membresiaProximoPago').textContent = new Date(fechaPago).toLocaleDateString('es-ES');
                        document.getElementById('membresiaExpiracion').textContent = new Date(fechaPago).toLocaleDateString('es-ES');
                    } else {
                        document.getElementById('membresiaExpiracion').textContent = 'No definida';
                    }
                } else {
                    console.log('No se encontró membresía para el usuario');
                    document.getElementById('membresiaTipo').textContent = 'Sin plan activo';
                    document.getElementById('membresiaEstado').textContent = 'Inactivo';
                    document.getElementById('membresiaEstado').className = 'value status-badge status-inactivo';
                    document.getElementById('membresiaInscripcion').textContent = '-';
                    document.getElementById('membresiaProximoPago').textContent = '-';
                    document.getElementById('membresiaExpiracion').textContent = '-';
                }
            } catch (error) {
                console.error('Error cargando membresía:', error);
                document.getElementById('membresiaTipo').textContent = 'Error al cargar';
            }
        }

        function populateForm(profile) {
            document.getElementById('displayName').textContent = `${profile.nombre || ''} ${profile.apellido || ''}`.trim() || 'Usuario';
            document.getElementById('displayEmail').textContent = profile.correo || '';
            document.getElementById('displayCedula').innerHTML = profile.cedula ? `<i class="fas fa-id-card"></i> ${profile.cedula}` : '<i class="fas fa-id-card"></i> No registrada';
            
            let rolDisplay = 'Usuario';
            if (profile.rol === 'admin') rolDisplay = 'Administrador';
            else if (profile.rol === 'entrenador') rolDisplay = 'Entrenador';
            document.getElementById('displayRole').textContent = rolDisplay;

            document.getElementById('cedula').value = profile.cedula || '';
            document.getElementById('nombre').value = profile.nombre || '';
            document.getElementById('apellido').value = profile.apellido || '';
            document.getElementById('correo').value = profile.correo || '';
            document.getElementById('telefono').value = profile.telefono || '';
            document.getElementById('fecha_nacimiento').value = profile.fecha_nacimiento || '';
            document.getElementById('edad').value = profile.edad || '';
            document.getElementById('peso').value = profile.peso || '';
            document.getElementById('estatura').value = profile.estatura || '';
            
            if (profile.genero) document.getElementById('genero').value = profile.genero;
            if (profile.tipo_sangre) document.getElementById('tipo_sangre').value = profile.tipo_sangre;
        }

        document.getElementById('toggleEditBtn').addEventListener('click', function() {
            isEditing = !isEditing;
            
            const inputs = document.querySelectorAll('#profileForm .form-control');
            const selects = document.querySelectorAll('#profileForm select');
            const actionButtons = document.getElementById('actionButtons');
            const editBtn = this;

            if (isEditing) {
                inputs.forEach(input => {
                    if (input.id !== 'correo') {
                        input.readOnly = false;
                        input.style.background = 'rgba(255,215,0,0.05)';
                        input.style.borderColor = '#FFD700';
                    }
                });
                selects.forEach(select => {
                    select.disabled = false;
                    select.style.background = 'rgba(255,215,0,0.05)';
                    select.style.borderColor = '#FFD700';
                });
                actionButtons.style.display = 'flex';
                editBtn.classList.add('active');
                editBtn.innerHTML = '<i class="fas fa-edit"></i> Editando...';
            } else {
                inputs.forEach(input => {
                    input.readOnly = true;
                    input.style.background = '';
                    input.style.borderColor = '';
                });
                selects.forEach(select => {
                    select.disabled = true;
                    select.style.background = '';
                    select.style.borderColor = '';
                });
                actionButtons.style.display = 'none';
                editBtn.classList.remove('active');
                editBtn.innerHTML = '<i class="fas fa-edit"></i> Editar Perfil';
            }
        });

        document.getElementById('cancelEditBtn').addEventListener('click', function() {
            populateForm(userProfile);
            isEditing = false;
            document.getElementById('toggleEditBtn').click();
            showAlert('Edición cancelada', 'success');
        });

        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!confirm('¿Guardar los cambios en tu perfil?')) return;

            try {
                const saveBtn = document.getElementById('saveProfileBtn');
                saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
                saveBtn.disabled = true;

                const updatedProfile = {
                    cedula: document.getElementById('cedula').value || null,
                    nombre: document.getElementById('nombre').value,
                    apellido: document.getElementById('apellido').value,
                    telefono: document.getElementById('telefono').value || null,
                    fecha_nacimiento: document.getElementById('fecha_nacimiento').value || null,
                    edad: document.getElementById('edad').value ? parseInt(document.getElementById('edad').value) : null,
                    genero: document.getElementById('genero').value || null,
                    tipo_sangre: document.getElementById('tipo_sangre').value || null,
                    peso: document.getElementById('peso').value ? parseFloat(document.getElementById('peso').value) : null,
                    estatura: document.getElementById('estatura').value ? parseFloat(document.getElementById('estatura').value) : null,
                    updated_at: new Date().toISOString()
                };

                const { error } = await supabase
                    .from('usuarios')
                    .update(updatedProfile)
                    .eq('id_usuario', currentUserId);

                if (error) throw error;

                userProfile = { ...userProfile, ...updatedProfile };
                populateForm(userProfile);
                showAlert('✅ Perfil actualizado correctamente', 'success');
                
                isEditing = false;
                document.getElementById('toggleEditBtn').click();

            } catch (error) {
                console.error('Error:', error);
                showAlert('Error: ' + error.message, 'error');
            } finally {
                const saveBtn = document.getElementById('saveProfileBtn');
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Guardar';
                saveBtn.disabled = false;
            }
        });

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }
    </script>
</body>
</html>
