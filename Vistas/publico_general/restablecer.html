<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jean Trainer - Crear Nueva Contraseña</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }
        
        body {
            background-color: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .reset-container {
            background-color: #111;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border: 2px solid #333;
            text-align: center;
        }
        
        .reset-icon {
            font-size: 4rem;
            color: #FFD700;
            margin-bottom: 20px;
        }
        
        .reset-container h1 {
            color: #FFD700;
            font-size: 2rem;
            margin-bottom: 20px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .reset-container p {
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px;
            background-color: #000;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            color: #fff;
        }
        
        .form-group input:focus {
            border-color: #FFD700;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.2);
        }
        
        .form-group label {
            position: absolute;
            left: 15px;
            top: 15px;
            color: #aaa;
            transition: all 0.3s ease;
            pointer-events: none;
            background-color: #111;
            padding: 0 5px;
        }
        
        .form-group input:focus + label,
        .form-group input:not(:placeholder-shown) + label {
            top: -10px;
            left: 10px;
            font-size: 12px;
            color: #FFD700;
            font-weight: 600;
        }
        
        .btn-reset {
            background-color: #FFD700;
            color: #000;
            border: none;
            border-radius: 50px;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn-reset:hover {
            background-color: #FFC400;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }
        
        .btn-reset:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #ccc;
        }
        
        .login-link a {
            color: #FFD700;
            text-decoration: none;
            font-weight: 700;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .message-display {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }
        
        .error-message {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            border-color: #e74c3c;
        }
        
        .success-message {
            background: rgba(39, 174, 96, 0.1);
            color: #27ae60;
            border-color: #27ae60;
        }
        
        .info-message {
            background: rgba(52, 152, 219, 0.1);
            color: #3498db;
            border-color: #3498db;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-10px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .strength-bar {
            height: 5px;
            background-color: #333;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        
        .password-strength-text {
            font-size: 12px;
            margin-top: 5px;
        }
        
        @media (max-width: 576px) {
            .reset-container {
                padding: 30px 20px;
            }
            
            .reset-container h1 {
                font-size: 1.6rem;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="reset-container">
        <div class="reset-icon">
            <i class="fas fa-lock-open"></i>
        </div>
        <h1>Nueva Contraseña</h1>
        <p>Ingresa tu nueva contraseña para restablecer el acceso a tu cuenta.</p>
        
        <div id="message-container"></div>
        
        <form id="resetForm">
            <div class="form-group">
                <input type="password" id="newPassword" name="newPassword" placeholder=" " required>
                <label for="newPassword">
                    <i class="fas fa-lock"></i> Nueva Contraseña
                </label>
                <div class="strength-bar">
                    <div class="strength-fill" id="passwordStrengthBar"></div>
                </div>
                <div class="password-strength-text" id="passwordStrengthText"></div>
            </div>
            
            <div class="form-group">
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder=" " required>
                <label for="confirmPassword">
                    <i class="fas fa-check-circle"></i> Confirmar Contraseña
                </label>
                <div class="password-strength-text" id="passwordMatchText"></div>
            </div>
            
            <button type="submit" class="btn-reset" id="submitBtn">
                <i class="fas fa-save"></i> Actualizar Contraseña
            </button>
        </form>
        
        <div class="login-link">
            <p>¿Ya recordaste tu contraseña?</p>
            <a href="login.html">Volver al Inicio de Sesión</a>
        </div>
    </div>

    <script type="module">
        import { supabase, updatePassword } from './supabaseClient.js';
        
        const form = document.getElementById('resetForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const messageContainer = document.getElementById('message-container');
        const strengthBar = document.getElementById('passwordStrengthBar');
        const strengthText = document.getElementById('passwordStrengthText');
        const matchText = document.getElementById('passwordMatchText');
        
        function showMessage(text, type) {
            messageContainer.innerHTML = '';
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-display ' + (type === 'error' ? 'error-message' : type === 'info' ? 'info-message' : 'success-message');
            messageDiv.textContent = text;
            messageContainer.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.style.opacity = '0';
                messageDiv.style.transition = 'opacity 0.5s';
                setTimeout(() => {
                    if (messageDiv.parentNode) messageDiv.remove();
                }, 500);
            }, 5000);
        }
        
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            let width = (strength / 5) * 100;
            let color = '#ff4444';
            let text = 'Muy débil';
            
            if (strength >= 4) {
                color = '#00ff00';
                text = 'Muy fuerte';
            } else if (strength >= 3) {
                color = '#ffaa00';
                text = 'Fuerte';
            } else if (strength >= 2) {
                color = '#ff8800';
                text = 'Regular';
            } else if (strength >= 1) {
                color = '#ff6666';
                text = 'Débil';
            }
            
            strengthBar.style.width = width + '%';
            strengthBar.style.backgroundColor = color;
            strengthText.textContent = text;
            strengthText.style.color = color;
            
            return strength;
        }
        
        function checkPasswordMatch() {
            const newPass = newPasswordInput.value;
            const confirmPass = confirmPasswordInput.value;
            
            if (confirmPass === '') {
                matchText.textContent = '';
                return false;
            }
            
            if (newPass === confirmPass) {
                matchText.textContent = '✓ Las contraseñas coinciden';
                matchText.style.color = '#27ae60';
                return true;
            } else {
                matchText.textContent = '✗ Las contraseñas no coinciden';
                matchText.style.color = '#e74c3c';
                return false;
            }
        }
        
        newPasswordInput.addEventListener('input', function() {
            checkPasswordStrength(this.value);
            checkPasswordMatch();
        });
        
        confirmPasswordInput.addEventListener('input', checkPasswordMatch);
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (!newPassword || !confirmPassword) {
                showMessage('Por favor, completa todos los campos', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('Las contraseñas no coinciden', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Actualizando...';
            
            try {
                const result = await updatePassword(newPassword);
                
                if (!result.success) {
                    throw new Error(result.error);
                }
                
                showMessage('✅ ¡Contraseña actualizada correctamente! Redirigiendo al login...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Error al actualizar: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Actualizar Contraseña';
            }
        });
        
        // Verificar si hay una sesión activa (venimos del enlace de recuperación)
        async function checkValidSession() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (!session) {
                    showMessage('⚠️ Esta página solo es accesible desde el enlace de recuperación de contraseña. Si no solicitaste restablecer tu contraseña, ignora este mensaje.', 'info');
                    submitBtn.disabled = false;
                } else {
                    console.log('✅ Sesión válida detectada, puedes restablecer tu contraseña');
                }
            } catch (error) {
                console.error('Error verificando sesión:', error);
            }
        }
        
        checkValidSession();
        
        // Animación para labels
        document.querySelectorAll('.form-group input').forEach(input => {
            if (input.value) updateLabelPosition(input);
            
            input.addEventListener('focus', function() { updateLabelPosition(this); });
            input.addEventListener('blur', function() { if (!this.value) resetLabelPosition(this); });
            input.addEventListener('input', function() {
                if (this.value) updateLabelPosition(this);
                else resetLabelPosition(this);
            });
        });
        
        function updateLabelPosition(input) {
            const label = input.previousElementSibling;
            label.style.top = '-10px';
            label.style.left = '10px';
            label.style.fontSize = '12px';
            label.style.color = '#FFD700';
        }
        
        function resetLabelPosition(input) {
            const label = input.previousElementSibling;
            label.style.top = '15px';
            label.style.left = '15px';
            label.style.fontSize = '16px';
            label.style.color = '#aaa';
        }
    </script>
</body>
</html>
