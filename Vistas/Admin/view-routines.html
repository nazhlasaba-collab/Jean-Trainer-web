<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Tablero de Rutinas - Jean Trainer</title>
    <style>
        /* (Mantén TODO el CSS que ya tienes) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header & Navbar */
        header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 1000;
            top: 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        .navbar {
            height: 70px;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo a {
            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 1.5rem;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .action-btn {
            background: #FFD700;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: #FFC400;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        /* Contenido Principal */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 20px 30px;
        }

        .page-title {
            font-size: 2.2rem;
            color: #FFD700;
            margin-bottom: 40px;
            text-align: center;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }

        .page-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #FFD700, transparent);
            border-radius: 3px;
        }

        /* Estadísticas */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #FFD700;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.1);
        }

        .stat-icon {
            font-size: 1.5rem;
            color: #FFD700;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 2.2rem;
            color: #FFD700;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #aaa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Filtros */
        .filters-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filters-title {
            color: #FFD700;
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            color: #FFD700;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-select, .search-input {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .filter-select:focus, .search-input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.1);
        }

        /* Tabla de Rutinas */
        .routines-table-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .table-title {
            color: #FFD700;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-actions {
            display: flex;
            gap: 10px;
        }

        .table-btn {
            padding: 8px 16px;
            background: rgba(255, 215, 0, 0.1);
            color: #FFD700;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .table-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }

        .routines-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .routines-table th {
            background: rgba(255, 215, 0, 0.1);
            color: #FFD700;
            font-weight: 700;
            text-align: left;
            padding: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
        }

        .routines-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            vertical-align: middle;
        }

        .routines-table tbody tr {
            transition: all 0.3s ease;
        }

        .routines-table tbody tr:hover {
            background: rgba(255, 215, 0, 0.05);
            transform: translateX(5px);
        }

        .routine-name-cell {
            font-weight: 700;
            color: #FFD700;
        }

        .type-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .type-crossfit {
            background: rgba(255, 107, 53, 0.2);
            color: #FF6B35;
            border: 1px solid rgba(255, 107, 53, 0.3);
        }

        .type-running {
            background: rgba(78, 205, 196, 0.2);
            color: #4ECDC4;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .type-hyrox {
            background: rgba(255, 209, 102, 0.2);
            color: #FFD166;
            border: 1px solid rgba(255, 209, 102, 0.3);
        }

        .type-personalizado {
            background: rgba(157, 78, 221, 0.2);
            color: #9D4EDD;
            border: 1px solid rgba(157, 78, 221, 0.3);
        }

        .instructions-preview {
            max-width: 300px;
            color: #ccc;
            font-size: 0.9rem;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-box-orient: vertical;
        }

        .actions-cell {
            display: flex;
            gap: 10px;
        }

        .action-icon-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .view-btn {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        .view-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
        }

        .edit-btn {
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
        }

        .edit-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .delete-btn {
            background: rgba(255, 65, 108, 0.2);
            color: #ff416c;
        }

        .delete-btn:hover {
            background: rgba(255, 65, 108, 0.3);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 65, 108, 0.3);
        }

        .date-cell {
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .creator-cell {
            font-weight: 600;
        }

        /* Loading */
        .loading-container {
            text-align: center;
            padding: 60px;
        }

        .loading-spinner {
            font-size: 3rem;
            color: #FFD700;
            margin-bottom: 20px;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: #aaa;
            font-size: 1.1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 2px dashed rgba(255, 215, 0, 0.3);
        }

        .empty-icon {
            font-size: 4rem;
            color: rgba(255, 215, 0, 0.3);
            margin-bottom: 20px;
        }

        .empty-text {
            color: #aaa;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        /* Paginación */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pagination-btn {
            padding: 8px 16px;
            background: rgba(255, 215, 0, 0.1);
            color: #FFD700;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-btn:hover:not(:disabled) {
            background: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }

        .page-info {
            color: #aaa;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .routines-table-container {
                padding: 15px;
            }
            
            .routines-table {
                min-width: 900px;
            }
            
            .instructions-preview {
                max-width: 200px;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 15px;
            }

            .main-content {
                padding: 90px 15px 20px;
            }

            .page-title {
                font-size: 1.8rem;
            }

            .dashboard-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }

            .header-actions {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }

            .action-btn {
                width: 100%;
            }
            
            .table-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .table-actions {
                width: 100%;
                justify-content: flex-start;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.4rem;
            }
            
            .page-title {
                font-size: 1.6rem;
            }

            .dashboard-stats {
                grid-template-columns: 1fr;
            }

            .stat-number {
                font-size: 1.8rem;
            }
            
            .actions-cell {
                flex-direction: column;
                align-items: center;
                gap: 5px;
            }
            
            .action-icon-btn {
                width: 30px;
                height: 30px;
                font-size: 0.8rem;
            }
        }
    </style>
    <!-- Importar Supabase -->
    <script type="module">
        import { supabase } from '../publico_general/supabaseClient.js';
        window.supabase = supabase;
    </script>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="navbar">
            <div class="logo">
                <a href="dashboard_admin.html">
                    <i class="fas fa-dumbbell"></i>
                    Athlex
                </a>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="window.location.href='../publico_general/dashboard_admin.html'">
                    <i class="fas fa-arrow-left"></i>
                    Regresar
                </button>
                <button class="action-btn" onclick="window.location.href='register-routines.html'">
                    <i class="fas fa-plus-circle"></i>
                    Nueva Rutina
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="main-content">
        <h1 class="page-title">TABLERO DE RUTINAS</h1>
        
        <!-- Estadísticas -->
        <div class="dashboard-stats">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-list-alt"></i>
                </div>
                <div class="stat-number" id="totalRoutines">0</div>
                <div class="stat-label">Total Rutinas</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-fire"></i>
                </div>
                <div class="stat-number" id="crossfitRoutines">0</div>
                <div class="stat-label">Crossfit</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-running"></i>
                </div>
                <div class="stat-number" id="runningRoutines">0</div>
                <div class="stat-label">Running</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-medal"></i>
                </div>
                <div class="stat-number" id="hyroxRoutines">0</div>
                <div class="stat-label">Hyrox</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-calendar-week"></i>
                </div>
                <div class="stat-number" id="thisWeekRoutines">0</div>
                <div class="stat-label">Esta Semana</div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filters-container">
            <h3 class="filters-title">
                <i class="fas fa-filter"></i>
                Filtros y Búsqueda
            </h3>
            <div class="filters-grid">
                <div class="filter-group">
                    <label for="filterType">
                        <i class="fas fa-dumbbell"></i>
                        Tipo de Rutina
                    </label>
                    <select id="filterType" class="filter-select">
                        <option value="all">Todos los tipos</option>
                        <option value="Crossfit">Crossfit</option>
                        <option value="Running">Running</option>
                        <option value="Hyrox">Hyrox</option>
                        <option value="personalizado">Personalizado</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterDate">
                        <i class="fas fa-calendar-alt"></i>
                        Fecha
                    </label>
                    <select id="filterDate" class="filter-select">
                        <option value="all">Todas las fechas</option>
                        <option value="today">Hoy</option>
                        <option value="week">Esta semana</option>
                        <option value="month">Este mes</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="searchInput">
                        <i class="fas fa-search"></i>
                        Buscar Rutina
                    </label>
                    <input type="text" id="searchInput" class="search-input" placeholder="Escribe para buscar...">
                </div>
            </div>
        </div>

        <!-- Tabla de Rutinas -->
        <div class="routines-table-container" id="routinesContainer">
            <div class="loading-container">
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                </div>
                <p class="loading-text">Cargando rutinas...</p>
            </div>
        </div>
    </main>

    <script>
        let supabaseClient;
        let allRoutines = [];
        let allUsers = [];
        let currentPage = 1;
        const rowsPerPage = 10;
        let filteredRoutines = [];
        
        // Inicializar
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const module = await import('../publico_general/supabaseClient.js');
                supabaseClient = module.supabase;
                
                // Verificar autenticación
                await checkAccess();
                
                // Cargar rutinas y usuarios
                await loadData();
                
                // Configurar filtros
                setupFilters();
                
            } catch (error) {
                console.error('Error inicializando:', error);
                showError('Error cargando la página');
            }
        });
        
        // Verificar acceso
        async function checkAccess() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            // Opcional: Verificar si es admin o entrenador
            const { data: profile } = await supabaseClient
                .from('usuarios')
                .select('rol')
                .eq('id_usuario', user.id)
                .single();
                
            if (!profile) {
                console.warn('Perfil de usuario no encontrado');
            }
        }
        
        // ========== FUNCIÓN CORREGIDA: Cargar datos ==========
        async function loadData() {
            try {
                console.log('🔄 Cargando rutinas...');
                
                // Cargar rutinas SELECCIONANDO LA COLUMNA 'tipo'
                const { data: routines, error: routinesError } = await supabaseClient
                    .from('rutinas')
                    .select('cod_rutina, nombre_rutina, tipo, instrucciones, fecha_inicio, fecha_fin, cod_membresia, creado_por, created_at')
                    .order('fecha_inicio', { ascending: false });
                
                if (routinesError) throw routinesError;
                
                console.log('📋 Rutinas desde BD:', routines);
                
                // Cargar usuarios
                const { data: users, error: usersError } = await supabaseClient
                    .from('usuarios')
                    .select('id_usuario, nombre, apellido, rol');
                
                if (usersError) throw usersError;
                
                allRoutines = routines || [];
                allUsers = users || [];
                
                // ===== ADAPTAR RUTINAS USANDO EL TIPO REAL DE LA BD =====
                allRoutines = allRoutines.map(routine => ({
                    id: routine.cod_rutina,
                    nombre_rutina: routine.nombre_rutina,
                    tipo_rutina: routine.tipo || 'Crossfit', // ← USAR LA COLUMNA 'tipo' DE LA BD
                    instrucciones: routine.instrucciones || '',
                    fecha_rutina: routine.fecha_inicio || routine.created_at?.split('T')[0] || new Date().toISOString().split('T')[0],
                    descripcion: routine.descripcion || '',
                    creado_por: routine.creado_por,
                    created_at: routine.created_at
                }));
                
                console.log('✅ Rutinas procesadas:', allRoutines);
                
                // Actualizar estadísticas
                updateStatistics();
                
                // Mostrar rutinas
                applyFilters();
                
            } catch (error) {
                console.error('Error cargando datos:', error);
                showError('Error cargando rutinas');
            }
        }
        
        // Obtener clase CSS según tipo
        function getTypeClass(type) {
            switch(type) {
                case 'Crossfit': return 'type-crossfit';
                case 'Running': return 'type-running';
                case 'Hyrox': return 'type-hyrox';
                default: return 'type-personalizado'; // Para personalizado y otros
            }
        }
        
        // Obtener icono según tipo
        function getTypeIcon(type) {
            switch(type) {
                case 'Crossfit': return 'fas fa-fire';
                case 'Running': return 'fas fa-running';
                case 'Hyrox': return 'fas fa-medal';
                default: return 'fas fa-user-cog'; // Para personalizado
            }
        }
        
        // Actualizar estadísticas
        function updateStatistics() {
            document.getElementById('totalRoutines').textContent = allRoutines.length;
            
            const crossfitRoutines = allRoutines.filter(r => r.tipo_rutina === 'Crossfit').length;
            document.getElementById('crossfitRoutines').textContent = crossfitRoutines;
            
            const runningRoutines = allRoutines.filter(r => r.tipo_rutina === 'Running').length;
            document.getElementById('runningRoutines').textContent = runningRoutines;
            
            const hyroxRoutines = allRoutines.filter(r => r.tipo_rutina === 'Hyrox').length;
            document.getElementById('hyroxRoutines').textContent = hyroxRoutines;
            
            // Rutinas esta semana
            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            startOfWeek.setHours(0, 0, 0, 0);
            
            const thisWeekRoutines = allRoutines.filter(routine => {
                try {
                    const routineDate = new Date(routine.fecha_rutina);
                    return routineDate >= startOfWeek && routineDate <= today;
                } catch (e) {
                    return false;
                }
            }).length;
            
            document.getElementById('thisWeekRoutines').textContent = thisWeekRoutines;
        }
        
        // Mostrar rutinas en tabla
        function displayRoutines(routines) {
            const routinesContainer = document.getElementById('routinesContainer');
            
            if (!routines || routines.length === 0) {
                routinesContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <i class="fas fa-clipboard-list"></i>
                        </div>
                        <h3 class="empty-text">No hay rutinas registradas</h3>
                        <button class="action-btn" onclick="window.location.href='register-routines.html'" style="max-width: 250px; margin: 0 auto;">
                            <i class="fas fa-plus-circle"></i> Crear Primera Rutina
                        </button>
                    </div>
                `;
                return;
            }
            
            // Calcular paginación
            const totalPages = Math.ceil(routines.length / rowsPerPage);
            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = startIndex + rowsPerPage;

        // Cambiar página
        function changePage(page) {
            if (page < 1 || page > Math.ceil(filteredRoutines.length / rowsPerPage)) return;
            currentPage = page;
            displayRoutines(filteredRoutines);
            // Scroll suave hacia arriba
            document.querySelector('.routines-table-container').scrollIntoView({ 
                behavior: 'smooth',
                block: 'start'
            });
        }
        
        // Configurar filtros
        function setupFilters() {
            const filterType = document.getElementById('filterType');
            const filterDate = document.getElementById('filterDate');
            const searchInput = document.getElementById('searchInput');
            
            filterType.addEventListener('change', applyFilters);
            filterDate.addEventListener('change', applyFilters);
            searchInput.addEventListener('input', applyFilters);
        }
        
        // Aplicar filtros
        function applyFilters() {
            const typeFilter = document.getElementById('filterType').value;
            const dateFilter = document.getElementById('filterDate').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            currentPage = 1; // Resetear a primera página
            
            let filtered = [...allRoutines];
            
            // Filtrar por tipo
            if (typeFilter !== 'all') {
                filtered = filtered.filter(r => r.tipo_rutina === typeFilter);
            }
            
            // Filtrar por fecha
            if (dateFilter !== 'all') {
                filtered = filtered.filter(routine => {
                    try {
                        const routineDate = new Date(routine.fecha_rutina);
                        const today = new Date();
                        
                        switch(dateFilter) {
                            case 'today':
                                return routineDate.toDateString() === today.toDateString();
                            case 'week':
                                const startOfWeek = new Date(today);
                                startOfWeek.setDate(today.getDate() - today.getDay());
                                startOfWeek.setHours(0, 0, 0, 0);
                                return routineDate >= startOfWeek && routineDate <= today;
                            case 'month':
                                const startOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
                                return routineDate >= startOfMonth && routineDate <= today;
                            default:
                                return true;
                        }
                    } catch (e) {
                        return false;
                    }
                });
            }
            
            // Filtrar por búsqueda
            if (searchTerm) {
                filtered = filtered.filter(routine => 
                    routine.nombre_rutina.toLowerCase().includes(searchTerm) ||
                    (routine.instrucciones && routine.instrucciones.toLowerCase().includes(searchTerm))
                );
            }
            
            filteredRoutines = filtered;
            displayRoutines(filteredRoutines);
        }
        
        // Refrescar datos
        async function refreshData() {
            try {
                showNotification('🔄 Actualizando datos...', 'info');
                await loadData();
                showNotification('✅ Datos actualizados', 'success');
            } catch (error) {
                console.error('Error refrescando datos:', error);
                showNotification('❌ Error al actualizar datos', 'error');
            }
        }
        
        // Exportar a CSV
        function exportToCSV() {
            if (filteredRoutines.length === 0) {
                showNotification('❌ No hay datos para exportar', 'error');
                return;
            }
            
            const csvContent = [
                ['Nombre', 'Tipo', 'Fecha', 'Creada por', 'Instrucciones (resumen)'],
                ...filteredRoutines.map(routine => {
                    const creator = allUsers.find(u => u.id_usuario === routine.creado_por);
                    const creatorName = creator ? `${creator.nombre} ${creator.apellido}` : 'Entrenador';
                    
                    let formattedDate = 'Sin fecha';
                    try {
                        const routineDate = new Date(routine.fecha_rutina);
                        formattedDate = routineDate.toLocaleDateString('es-ES');
                    } catch (e) {
                        formattedDate = 'N/A';
                    }
                    
                    return [
                        routine.nombre_rutina,
                        routine.tipo_rutina,
                        formattedDate,
                        creatorName,
                        routine.instrucciones ? routine.instrucciones.substring(0, 100) : ''
                    ];
                })
            ].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `rutinas_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showNotification('📊 CSV exportado correctamente', 'success');
        }

            if (!confirm(`¿Estás seguro de eliminar la rutina "${routineName}"?\nEsta acción no se puede deshacer.`)) {
                return;
            }
            
            try {
                const { error } = await supabaseClient
                    .from('rutinas')
                    .delete()
                    .eq('cod_rutina', routineId);
                
                if (error) throw error;
                
                showNotification('✅ Rutina eliminada exitosamente', 'success');
                
                await loadData();
                
            } catch (error) {
                console.error('Error eliminando rutina:', error);
                showNotification('❌ Error al eliminar rutina', 'error');
            }
        }

            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                background: ${type === 'success' ? '#4CAF50' : type === 'error' ? '#f44336' : '#2196F3'};
                color: white;
                border-radius: 10px;
                z-index: 3000;
                font-weight: 600;
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
                animation: slideIn 0.3s ease;
                display: flex;
                align-items: center;
                gap: 10px;
                max-width: 400px;
            `;
            
            notification.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                ${message}
            `;
            
            document.body.appendChild(notification);
            
            if (!document.querySelector('#notification-styles')) {
                const style = document.createElement('style');
                style.id = 'notification-styles';
                style.textContent = `
                    @keyframes slideIn {
                        from { transform: translateX(100%); opacity: 0; }
                        to { transform: translateX(0); opacity: 1; }
                    }
                    @keyframes slideOut {
                        from { transform: translateX(0); opacity: 1; }
                        to { transform: translateX(100%); opacity: 0; }
                    }
                `;
                document.head.appendChild(style);
            }
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    if (notification.parentNode) {
                        document.body.removeChild(notification);
                    }
                }, 300);
            }, 3000);
        }
        
        // Mostrar error
        function showError(message) {
            const routinesContainer = document.getElementById('routinesContainer');
            routinesContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon" style="color: #ff4444;">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h3 class="empty-text">${message}</h3>
                    <button class="action-btn" onclick="location.reload()" style="max-width: 250px; margin: 0 auto;">
                        <i class="fas fa-redo"></i> Reintentar
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
