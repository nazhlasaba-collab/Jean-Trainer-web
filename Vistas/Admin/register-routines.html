<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Registrar Rutinas - Jean Trainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background-color: #000;
            position: fixed;
            width: 100%;
            z-index: 1000;
            top: 0;
            border-bottom: 2px solid #FFD700;
        }

        .navbar {
            height: 80px;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo a {
            color: inherit;
            text-decoration: none;
        }

        .back-btn {
            background-color: #FFD700;
            color: #000;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #FFC400;
            transform: scale(1.05);
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 30px 50px;
        }

        .page-title {
            font-size: 2.5rem;
            color: #FFD700;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-container {
            background-color: #111;
            border-radius: 15px;
            padding: 40px;
            border: 2px solid #333;
            max-width: 900px;
            margin: 0 auto;
        }

        .routine-info {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0.05));
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .routine-info h3 {
            color: #FFD700;
            margin-bottom: 25px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-item label {
            color: #FFD700;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-item input,
        .info-item select,
        .info-item textarea {
            padding: 12px 15px;
            background-color: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .info-item input:focus,
        .info-item select:focus,
        .info-item textarea:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.2);
        }

        .custom-type-container {
            display: none;
            margin-top: 15px;
        }

        .custom-type-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .asignar-container {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .asignar-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .search-user {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .search-user input {
            flex: 1;
            padding: 10px;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
        }

        .search-user button {
            background: #FFD700;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
        }

        .user-results {
            max-height: 200px;
            overflow-y: auto;
        }

        .user-result-item {
            padding: 10px;
            background: #222;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-result-item:hover {
            background: #333;
            border-left: 3px solid #FFD700;
        }

        .selected-user-info {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-user-btn {
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .instructions-container {
            margin: 40px 0;
        }

        .instructions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .instructions-header h3 {
            color: #FFD700;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .add-instruction-btn {
            background-color: #FFD700;
            color: #000;
            border: none;
            border-radius: 5px;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .add-instruction-btn:hover {
            background-color: #FFC400;
            transform: scale(1.05);
        }

        .instruction-item {
            background-color: #222;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #444;
            transition: all 0.3s ease;
        }

        .instruction-item:hover {
            border-color: #FFD700;
            transform: translateX(5px);
        }

        .instruction-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .instruction-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .instruction-number {
            background-color: #FFD700;
            color: #000;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .instruction-label {
            font-weight: 600;
            color: #FFD700;
            font-size: 1.1rem;
        }

        .remove-instruction {
            background: none;
            border: none;
            color: #FF4444;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .remove-instruction:hover {
            transform: scale(1.2);
        }

        .instruction-content textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            background-color: #333;
            border: 1px solid #555;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            resize: vertical;
            line-height: 1.5;
        }

        .instruction-content textarea:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.2);
        }

        .instruction-hint {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 10px;
            font-style: italic;
        }

        .actions-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #333;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #FFC400);
            color: #000;
            border: none;
            border-radius: 50px;
            padding: 16px 45px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #FFC400, #FFB300);
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .btn-secondary {
            background-color: #222;
            color: #fff;
            border: 2px solid #FFD700;
            border-radius: 50px;
            padding: 16px 45px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-secondary:hover {
            background-color: #333;
            transform: scale(1.05);
        }

        .preview-section {
            margin-top: 40px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 215, 0, 0.02));
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 12px;
            padding: 30px;
        }

        .preview-title {
            color: #FFD700;
            margin-bottom: 25px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .preview-routine {
            background-color: #222;
            border-radius: 10px;
            padding: 25px;
            border-left: 4px solid #FFD700;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #444;
        }

        .preview-routine-name {
            font-weight: 700;
            font-size: 1.5rem;
            color: #fff;
        }

        .preview-routine-type {
            background-color: #FFD700;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .preview-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .preview-info-item {
            background-color: #333;
            border-radius: 8px;
            padding: 15px;
        }

        .preview-info-label {
            color: #FFD700;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .preview-info-value {
            color: #fff;
            font-size: 1.1rem;
        }

        .preview-instructions-title {
            color: #FFD700;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .preview-instruction {
            background-color: #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #FFD700;
        }

        .preview-instruction-number {
            color: #FFD700;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .preview-instruction-content {
            color: #ccc;
            line-height: 1.5;
            white-space: pre-line;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background-color: rgba(0, 255, 0, 0.1);
            border: 1px solid #00FF00;
            color: #00FF00;
            display: block;
        }

        .message.error {
            background-color: rgba(255, 0, 0, 0.1);
            border: 1px solid #FF4444;
            color: #FF4444;
            display: block;
        }

        @media (max-width: 768px) {
            .navbar { padding: 0 20px; }
            .main-content { padding: 100px 20px 30px; }
            .page-title { font-size: 2rem; }
            .form-container { padding: 25px 20px; }
            .info-grid { grid-template-columns: 1fr; }
            .instructions-header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .add-instruction-btn { width: 100%; justify-content: center; }
            .actions-container { flex-direction: column; align-items: center; gap: 15px; }
            .btn-primary, .btn-secondary { width: 100%; max-width: 300px; }
            .preview-header { flex-direction: column; gap: 15px; align-items: flex-start; }
        }

        @media (max-width: 480px) {
            .logo { font-size: 1.4rem; }
            .back-btn { padding: 8px 20px; font-size: 0.9rem; }
            .page-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo"><a href="#">Athlex</a></div>
            <button class="back-btn" onclick="window.location.href='../publico_general/dashboard_admin.html'">
                <i class="fas fa-arrow-left"></i> Regresar
            </button>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">Crear Nueva Rutina</h1>
        <div class="form-container">
            <div id="message" class="message"></div>
            <form id="routineForm">
                <div class="routine-info">
                    <h3><i class="fas fa-info-circle"></i> Información de la Rutina</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <label for="routineName"><i class="fas fa-heading"></i> Nombre de la Rutina *</label>
                            <input type="text" id="routineName" placeholder="Ej: WOD Fran, Entrenamiento de Running" required>
                        </div>
                        <div class="info-item">
                            <label for="routineDate"><i class="fas fa-calendar-alt"></i> Fecha de la Rutina *</label>
                            <input type="date" id="routineDate" required>
                        </div>
                        <div class="info-item">
                            <label for="routineType"><i class="fas fa-dumbbell"></i> Tipo de Rutina *</label>
                            <select id="routineType" required onchange="window.toggleCustomType(); window.toggleAsignar()">
                                <option value="">Seleccionar tipo</option>
                                <option value="Crossfit">Crossfit</option>
                                <option value="Running">Running</option>
                                <option value="Hyrox">Hyrox</option>
                                <option value="personalizado">Personalizado</option>
                            </select>
                        </div>
                    </div>
                    <div id="customTypeContainer" class="custom-type-container">
                        <div class="info-item">
                            <label for="customRoutineType"><i class="fas fa-edit"></i> Especificar tipo personalizado</label>
                            <input type="text" id="customRoutineType" placeholder="Ej: Calistenia, Powerlifting, Yoga, etc.">
                        </div>
                    </div>
                    
                    <!-- Asignar a usuario (solo para personalizado) -->
                    <div id="asignarContainer" class="asignar-container">
                        <h4 style="color: #FFD700; margin-bottom: 15px;"><i class="fas fa-user-plus"></i> Asignar a Usuario (Opcional)</h4>
                        <div class="search-user">
                            <input type="text" id="searchUserInput" placeholder="Buscar por nombre, apellido o cédula...">
                            <button type="button" onclick="window.buscarUsuarios()"><i class="fas fa-search"></i> Buscar</button>
                        </div>
                        <div id="userResults" class="user-results"></div>
                        <div id="selectedUserInfo" class="selected-user-info" style="display: none;">
                            <span><i class="fas fa-user-check"></i> <span id="selectedUserName"></span></span>
                            <button type="button" class="clear-user-btn" onclick="window.limpiarUsuarioSeleccionado()">Quitar</button>
                        </div>
                        <input type="hidden" id="selectedUserId" value="">
                    </div>
                    
                    <div class="info-item">
                        <label for="routineDescription"><i class="fas fa-align-left"></i> Descripción (Opcional)</label>
                        <textarea id="routineDescription" rows="3" placeholder="Describe la rutina, objetivos, consideraciones especiales..."></textarea>
                    </div>
                </div>

                <div class="instructions-container">
                    <div class="instructions-header">
                        <h3><i class="fas fa-list-ol"></i> Instrucciones de la Rutina</h3>
                        <button type="button" class="add-instruction-btn" onclick="window.addInstruction()">
                            <i class="fas fa-plus"></i> Añadir Instrucción
                        </button>
                    </div>
                    <div id="instructionsList">
                        <div class="instruction-item" id="instruction-1">
                            <div class="instruction-header-row">
                                <div class="instruction-title">
                                    <div class="instruction-number">1</div>
                                    <div class="instruction-label">Instrucción #1</div>
                                </div>
                                <button type="button" class="remove-instruction" onclick="window.removeInstruction('instruction-1')">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                            <div class="instruction-content">
                                <textarea placeholder="Escribe una instrucción detallada..." required></textarea>
                            </div>
                            <div class="instruction-hint">Puedes usar viñetas, porcentajes, distancias, repeticiones, etc.</div>
                        </div>
                    </div>
                </div>

                <div class="preview-section">
                    <div class="preview-title"><i class="fas fa-eye"></i> Vista Previa</div>
                    <div id="routinePreview"></div>
                </div>

                <div class="actions-container">
                    <button type="submit" class="btn-primary" id="submitBtn">
                        <i class="fas fa-save"></i> Guardar Rutina
                    </button>
                    <button type="button" class="btn-secondary" onclick="window.resetForm()">
                        <i class="fas fa-redo"></i> Limpiar Todo
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script type="module">
        import { supabase } from '../publico_general/supabaseClient.js';
        
        let instructionCount = 1;
        let supabaseClient = supabase;
        let currentUser = null;
        let usuarioSeleccionado = null;

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                if (!supabaseClient) throw new Error('No se pudo cargar Supabase');
                
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) { alert('Debes iniciar sesión'); window.location.href = 'login.html'; return; }
                currentUser = user;
                
                const { data: profile } = await supabaseClient.from('usuarios').select('rol').eq('id_usuario', user.id).single();
                if (!profile || (profile.rol !== 'admin' && profile.rol !== 'entrenador')) {
                    alert('Solo administradores y entrenadores pueden crear rutinas');
                    window.location.href = 'dashboard.html'; return;
                }
                
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('routineDate').value = today;
                window.updatePreview();
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error cargando la aplicación: ' + error.message, 'error');
            }
        });

        function showMessage(text, type = 'success') {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
        }

        window.toggleCustomType = function() {
            const routineType = document.getElementById('routineType').value;
            const customTypeContainer = document.getElementById('customTypeContainer');
            if (routineType === 'personalizado') {
                customTypeContainer.classList.add('active');
                document.getElementById('customRoutineType').required = true;
            } else {
                customTypeContainer.classList.remove('active');
                document.getElementById('customRoutineType').required = false;
            }
            window.updatePreview();
        }

        window.toggleAsignar = function() {
            const routineType = document.getElementById('routineType').value;
            const asignarContainer = document.getElementById('asignarContainer');
            if (routineType === 'personalizado') {
                asignarContainer.classList.add('active');
            } else {
                asignarContainer.classList.remove('active');
                window.limpiarUsuarioSeleccionado();
            }
        }

        window.buscarUsuarios = async function() {
            const searchTerm = document.getElementById('searchUserInput').value.trim();
            if (!searchTerm) {
                showMessage('Ingresa un nombre, apellido o cédula para buscar', 'error');
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('usuarios')
                    .select('id_usuario, nombre, apellido, correo, cedula')
                    .or(`nombre.ilike.%${searchTerm}%,apellido.ilike.%${searchTerm}%,cedula.ilike.%${searchTerm}%,correo.ilike.%${searchTerm}%`)
                    .limit(10);

                if (error) throw error;

                const resultsContainer = document.getElementById('userResults');
                if (!data || data.length === 0) {
                    resultsContainer.innerHTML = '<div style="padding: 10px; text-align: center; color: #aaa;">No se encontraron usuarios</div>';
                    return;
                }

                resultsContainer.innerHTML = data.map(user => `
                    <div class="user-result-item" onclick="window.seleccionarUsuario('${user.id_usuario}', '${user.nombre} ${user.apellido}', '${user.cedula || 'Sin cédula'}')">
                        <div>
                            <strong>${user.nombre} ${user.apellido}</strong><br>
                            <small style="color: #aaa;">📧 ${user.correo}</small>
                        </div>
                        <div style="color: #FFD700;">
                            <i class="fas fa-id-card"></i> ${user.cedula || 'N/A'}
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error:', error);
                showMessage('Error al buscar usuarios', 'error');
            }
        }

        window.seleccionarUsuario = function(id, nombreCompleto, cedula) {
            usuarioSeleccionado = { id, nombreCompleto, cedula };
            document.getElementById('selectedUserId').value = id;
            document.getElementById('selectedUserName').innerHTML = `<i class="fas fa-id-card"></i> ${cedula || 'Sin cédula'} - ${nombreCompleto}`;
            document.getElementById('selectedUserInfo').style.display = 'flex';
            document.getElementById('userResults').innerHTML = '';
            document.getElementById('searchUserInput').value = '';
            window.updatePreview();
        }

        window.limpiarUsuarioSeleccionado = function() {
            usuarioSeleccionado = null;
            document.getElementById('selectedUserId').value = '';
            document.getElementById('selectedUserInfo').style.display = 'none';
            window.updatePreview();
        }

        window.addInstruction = function() {
            instructionCount++;
            const instructionsList = document.getElementById('instructionsList');
            const instructionId = `instruction-${instructionCount}`;
            const newInstruction = document.createElement('div');
            newInstruction.className = 'instruction-item';
            newInstruction.id = instructionId;
            newInstruction.innerHTML = `
                <div class="instruction-header-row">
                    <div class="instruction-title">
                        <div class="instruction-number">${instructionCount}</div>
                        <div class="instruction-label">Instrucción #${instructionCount}</div>
                    </div>
                    <button type="button" class="remove-instruction" onclick="window.removeInstruction('${instructionId}')">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="instruction-content">
                    <textarea placeholder="Escribe una instrucción detallada..." required></textarea>
                </div>
                <div class="instruction-hint">Puedes usar viñetas, porcentajes, distancias, repeticiones, etc.</div>
            `;
            instructionsList.appendChild(newInstruction);
            newInstruction.querySelector('textarea').focus();
            window.updatePreview();
        }

        window.removeInstruction = function(instructionId) {
            const instructionElement = document.getElementById(instructionId);
            if (instructionElement && instructionCount > 1) {
                instructionElement.remove();
                instructionCount--;
                updateInstructionNumbers();
                window.updatePreview();
            } else if (instructionCount === 1) {
                alert('Debe haber al menos una instrucción en la rutina');
            }
        }

        function updateInstructionNumbers() {
            const instructionItems = document.querySelectorAll('.instruction-item');
            instructionItems.forEach((item, index) => {
                const numberDiv = item.querySelector('.instruction-number');
                const labelDiv = item.querySelector('.instruction-label');
                if (numberDiv) numberDiv.textContent = index + 1;
                if (labelDiv) labelDiv.textContent = `Instrucción #${index + 1}`;
            });
            instructionCount = instructionItems.length;
        }

        window.updatePreview = function() {
            const previewContainer = document.getElementById('routinePreview');
            const routineName = document.getElementById('routineName').value.trim();
            const routineDate = document.getElementById('routineDate').value;
            const routineType = document.getElementById('routineType').value;
            const customRoutineType = document.getElementById('customRoutineType').value.trim();
            const routineDescription = document.getElementById('routineDescription').value.trim();
            const assignedUser = usuarioSeleccionado;
            
            const instructionItems = document.querySelectorAll('.instruction-item');
            const instructions = [];
            instructionItems.forEach(item => {
                const textarea = item.querySelector('textarea');
                if (textarea && textarea.value.trim() !== '') instructions.push(textarea.value.trim());
            });
            
            let formattedDate = 'No especificada';
            if (routineDate) {
                const dateObj = new Date(routineDate);
                formattedDate = dateObj.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            }
            
            let displayType = 'No especificado';
            if (routineType === 'personalizado' && customRoutineType) displayType = customRoutineType;
            else if (routineType) displayType = routineType;
            
            let previewHTML = `
                <div class="preview-routine">
                    <div class="preview-header">
                        <div class="preview-routine-name">${routineName || 'Rutina sin nombre'}</div>
                        <div class="preview-routine-type">${displayType.toUpperCase()}</div>
                    </div>
                    <div class="preview-info">
                        <div class="preview-info-item">
                            <div class="preview-info-label">Fecha</div>
                            <div class="preview-info-value">${formattedDate}</div>
                        </div>
                        <div class="preview-info-item">
                            <div class="preview-info-label">Deporte</div>
                            <div class="preview-info-value">${routineType === 'Crossfit' ? '🏋️ Crossfit' : routineType === 'Running' ? '🏃 Running' : routineType === 'Hyrox' ? '💪 Hyrox' : '📋 Personalizado'}</div>
                        </div>
            `;
            
            if (assignedUser) {
                previewHTML += `
                    <div class="preview-info-item">
                        <div class="preview-info-label">Asignado a</div>
                        <div class="preview-info-value">👤 ${assignedUser.nombreCompleto} (${assignedUser.cedula || 'Sin cédula'})</div>
                    </div>
                `;
            }
            
            previewHTML += `</div>`;
            
            if (routineDescription) {
                previewHTML += `<div class="preview-info-item" style="grid-column: 1/-1; margin-bottom:15px;"><div class="preview-info-label">Descripción</div><div class="preview-info-value">${routineDescription}</div></div>`;
            }
            
            if (instructions.length > 0) {
                previewHTML += `<div class="preview-instructions-title"><i class="fas fa-list-ol"></i> Instrucciones</div>`;
                instructions.forEach((instruction, index) => {
                    previewHTML += `<div class="preview-instruction"><div class="preview-instruction-number">Instrucción ${index + 1}</div><div class="preview-instruction-content">${instruction.replace(/\n/g, '<br>')}</div></div>`;
                });
            } else {
                previewHTML += `<div class="preview-instruction" style="text-align: center; color: #888;">No hay instrucciones añadidas</div>`;
            }
            previewHTML += '</div>';
            previewContainer.innerHTML = previewHTML;
        }

        window.resetForm = function() {
            if (confirm('¿Estás seguro de limpiar todo el formulario?')) {
                document.getElementById('routineForm').reset();
                const instructionsList = document.getElementById('instructionsList');
                while (instructionsList.children.length > 1) instructionsList.removeChild(instructionsList.lastChild);
                instructionCount = 1;
                const firstInstruction = instructionsList.querySelector('.instruction-item');
                if (firstInstruction) {
                    const textarea = firstInstruction.querySelector('textarea');
                    if (textarea) textarea.value = '';
                }
                document.getElementById('customTypeContainer').classList.remove('active');
                document.getElementById('asignarContainer').classList.remove('active');
                window.limpiarUsuarioSeleccionado();
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('routineDate').value = today;
                window.updatePreview();
            }
        }

        document.getElementById('routineForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const routineName = document.getElementById('routineName').value.trim();
            const routineType = document.getElementById('routineType').value;
            const customRoutineType = document.getElementById('customRoutineType').value.trim();
            const assignedUserId = document.getElementById('selectedUserId').value || null;
            
            if (!routineName) { showMessage('El nombre de la rutina es obligatorio', 'error'); return; }
            if (!routineType) { showMessage('Debe seleccionar un tipo de rutina', 'error'); return; }
            if (routineType === 'personalizado' && !customRoutineType) { showMessage('Debe especificar el tipo personalizado', 'error'); return; }
            
            const instructionItems = document.querySelectorAll('.instruction-item');
            let hasValidInstructions = false;
            for (let item of instructionItems) {
                const textarea = item.querySelector('textarea');
                if (textarea && textarea.value.trim() !== '') { hasValidInstructions = true; break; }
            }
            if (!hasValidInstructions) { showMessage('Debe añadir al menos una instrucción', 'error'); return; }
            
            const instructions = [];
            instructionItems.forEach(item => {
                const textarea = item.querySelector('textarea');
                if (textarea && textarea.value.trim() !== '') instructions.push(textarea.value.trim());
            });
            
            const finalType = routineType === 'personalizado' ? customRoutineType : routineType;
            const routineDescription = document.getElementById('routineDescription').value.trim();
            const routineDate = document.getElementById('routineDate').value;
            const instructionsText = instructions.join('\n\n---\n\n');
            
            let deporte = '';
            switch(routineType) {
                case 'Crossfit': deporte = 'crossfit'; break;
                case 'Running': deporte = 'running'; break;
                case 'Hyrox': deporte = 'hyrox'; break;
                case 'personalizado': deporte = 'personalizado'; break;
                default: deporte = customRoutineType.toLowerCase();
            }
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
            submitBtn.disabled = true;
            
            try {
                const { data, error } = await supabaseClient.rpc('crear_rutina_supabase', {
                    p_nombre_rutina: routineName,
                    p_fecha_rutina: routineDate,
                    p_tipo_rutina: finalType,
                    p_deporte: deporte,
                    p_descripcion: routineDescription || null,
                    p_instrucciones: instructionsText,
                    p_creado_por: currentUser.id,
                    p_asignado_a: assignedUserId
                });
                
                if (error) throw error;
                if (data.success) {
                    showMessage(data.message || `✅ Rutina "${routineName}" (${finalType}) creada exitosamente`, 'success');
                    setTimeout(() => window.resetForm(), 2000);
                    setTimeout(() => { window.location.href = 'view-routines.html'; }, 3000);
                } else {
                    throw new Error(data.error || 'Error creando rutina');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage(`❌ Error: ${error.message}`, 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
