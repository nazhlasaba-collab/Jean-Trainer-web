<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Tablero de Usuarios - Jean Trainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 1000;
            top: 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        .navbar {
            height: 70px;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo a {
            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i {
            font-size: 1.5rem;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .action-btn {
            background: #FFD700;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: #FFC400;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 20px 30px;
        }

        .page-title {
            font-size: 2.2rem;
            color: #FFD700;
            margin-bottom: 40px;
            text-align: center;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }

        .page-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #FFD700, transparent);
            border-radius: 3px;
        }

        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #FFD700;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.1);
        }

        .stat-icon {
            font-size: 1.5rem;
            color: #FFD700;
            margin-bottom: 10px;
        }

        .stat-number {
            font-size: 2.2rem;
            color: #FFD700;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #aaa;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filters-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filters-title {
            color: #FFD700;
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            color: #FFD700;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-select, .search-input {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .filter-select:focus, .search-input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.1);
        }

        .filter-select option {
            background: #1a1a1a;
            color: #fff;
        }

        .users-table-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .table-title {
            color: #FFD700;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-actions {
            display: flex;
            gap: 10px;
        }

        .table-btn {
            padding: 8px 16px;
            background: rgba(255, 215, 0, 0.1);
            color: #FFD700;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .table-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .users-table th {
            background: rgba(255, 215, 0, 0.1);
            color: #FFD700;
            font-weight: 700;
            text-align: left;
            padding: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
        }

        .users-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            vertical-align: middle;
        }

        .users-table tbody tr {
            transition: all 0.3s ease;
        }

        .users-table tbody tr:hover {
            background: rgba(255, 215, 0, 0.05);
            transform: translateX(5px);
        }

        .user-name-cell {
            font-weight: 700;
            color: #FFD700;
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-admin {
            background: rgba(255, 107, 53, 0.2);
            color: #FF6B35;
            border: 1px solid rgba(255, 107, 53, 0.3);
        }

        .role-entrenador {
            background: rgba(78, 205, 196, 0.2);
            color: #4ECDC4;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .role-usuario {
            background: rgba(255, 209, 102, 0.2);
            color: #FFD166;
            border: 1px solid rgba(255, 209, 102, 0.3);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-activo {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .status-inactivo {
            background: rgba(255, 193, 7, 0.2);
            color: #FFC107;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .status-suspendido {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .status-cancelado {
            background: rgba(158, 158, 158, 0.2);
            color: #9E9E9E;
            border: 1px solid rgba(158, 158, 158, 0.3);
        }

        .membership-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .membership-crossfit {
            background: rgba(156, 39, 176, 0.2);
            color: #9C27B0;
            border: 1px solid rgba(156, 39, 176, 0.3);
        }

        .membership-running {
            background: rgba(33, 150, 243, 0.2);
            color: #2196F3;
            border: 1px solid rgba(33, 150, 243, 0.3);
        }

        .membership-premium {
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .membership-personalizado {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }

        .actions-cell {
            display: flex;
            gap: 10px;
        }

        .action-icon-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .view-btn {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        .view-btn:hover {
            background: rgba(102, 126, 234, 0.3);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
        }

        .edit-btn {
            background: rgba(255, 215, 0, 0.2);
            color: #FFD700;
        }

        .edit-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .delete-btn {
            background: rgba(255, 65, 108, 0.2);
            color: #ff416c;
        }

        .delete-btn:hover {
            background: rgba(255, 65, 108, 0.3);
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 65, 108, 0.3);
        }

        .date-cell {
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .loading-container {
            text-align: center;
            padding: 60px;
        }

        .loading-spinner {
            font-size: 3rem;
            color: #FFD700;
            margin-bottom: 20px;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: #aaa;
            font-size: 1.1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 2px dashed rgba(255, 215, 0, 0.3);
        }

        .empty-icon {
            font-size: 4rem;
            color: rgba(255, 215, 0, 0.3);
            margin-bottom: 20px;
        }

        .empty-text {
            color: #aaa;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pagination-btn {
            padding: 8px 16px;
            background: rgba(255, 215, 0, 0.1);
            color: #FFD700;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-btn:hover:not(:disabled) {
            background: rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }

        .page-info {
            color: #aaa;
            font-size: 0.9rem;
        }

        .user-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        .user-modal-container {
            background: linear-gradient(145deg, #1a1a1a 0%, #2a2a2a 100%);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            animation: slideUp 0.4s ease;
        }
        
        .modal-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff4444;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }
        
        .modal-close-btn:hover {
            background: #ff0000;
            transform: rotate(90deg) scale(1.1);
        }
        
        .modal-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
        }
        
        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .user-header-info {
            flex: 1;
        }
        
        .modal-title {
            color: #FFD700;
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
        }
        
        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }
        
        .tab-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            background: rgba(255, 215, 0, 0.1);
            color: #FFD700;
        }
        
        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }
        
        .tab-content {
            margin-bottom: 30px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .info-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .info-label {
            color: #FFD700;
            font-size: 0.85rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-value {
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .membership-details, .no-membership, .routines-list, .no-routines {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .membership-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .routine-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .routine-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .modal-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex: 1;
        }
        
        .modal-btn.edit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .modal-btn.delete-btn {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            color: white;
        }
        
        .modal-btn.close-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #FFD700;
            border: 2px solid #FFD700;
        }
        
        .modal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #4CAF50;
            color: white;
            border-radius: 10px;
            z-index: 3000;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
        }
        
        .notification.error {
            background: #f44336;
        }
        
        .notification.info {
            background: #2196F3;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        @media (max-width: 1024px) {
            .users-table-container { padding: 15px; }
            .users-table { min-width: 1000px; }
        }

        @media (max-width: 768px) {
            .navbar { padding: 0 15px; }
            .main-content { padding: 90px 15px 20px; }
            .page-title { font-size: 1.8rem; }
            .dashboard-stats { grid-template-columns: repeat(2, 1fr); }
            .filters-grid { grid-template-columns: 1fr; }
            .header-actions { flex-direction: column; gap: 10px; width: 100%; }
            .action-btn { width: 100%; }
            .table-header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .table-actions { width: 100%; justify-content: flex-start; }
            .user-modal-container { padding: 20px; }
            .modal-header { flex-direction: column; text-align: center; }
            .modal-title { font-size: 1.6rem; }
        }

        @media (max-width: 480px) {
            .logo { font-size: 1.4rem; }
            .page-title { font-size: 1.6rem; }
            .dashboard-stats { grid-template-columns: 1fr; }
            .stat-number { font-size: 1.8rem; }
            .actions-cell { flex-direction: column; align-items: center; gap: 5px; }
            .action-icon-btn { width: 30px; height: 30px; font-size: 0.8rem; }
            .modal-tabs { flex-direction: column; }
            .modal-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">
                <a href="../publico_general/dashboard_admin.html">
                    <i class="fas fa-dumbbell"></i>
                    Jean Trainer
                </a>
            </div>
            <div class="header-actions">
                <button class="action-btn" onclick="window.location.href='../publico_general/dashboard_admin.html'">
                    <i class="fas fa-arrow-left"></i> Regresar
                </button>
                <button class="action-btn" onclick="window.refreshData()">
                    <i class="fas fa-sync-alt"></i> Actualizar
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">TABLERO DE USUARIOS</h1>
        
        <div class="dashboard-stats">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">Total Usuarios</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-user-shield"></i></div>
                <div class="stat-number" id="adminUsers">0</div>
                <div class="stat-label">Administradores</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-dumbbell"></i></div>
                <div class="stat-number" id="entrenadorUsers">0</div>
                <div class="stat-label">Entrenadores</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-user-check"></i></div>
                <div class="stat-number" id="activeMemberships">0</div>
                <div class="stat-label">Membresías Activas</div>
            </div>
        </div>

        <div class="filters-container">
            <h3 class="filters-title">
                <i class="fas fa-filter"></i> Filtros y Búsqueda
            </h3>
            <div class="filters-grid">
                <div class="filter-group">
                    <label for="filterRole"><i class="fas fa-user-tag"></i> Rol de Usuario</label>
                    <select id="filterRole" class="filter-select">
                        <option value="all">Todos los roles</option>
                        <option value="admin">Administrador</option>
                        <option value="entrenador">Entrenador</option>
                        <option value="usuario">Usuario</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="filterStatus"><i class="fas fa-check-circle"></i> Estado Membresía</label>
                    <select id="filterStatus" class="filter-select">
                        <option value="all">Todos los estados</option>
                        <option value="activo">Activo</option>
                        <option value="inactivo">Inactivo</option>
                        <option value="suspendido">Suspendido</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="searchInput"><i class="fas fa-search"></i> Buscar Usuario</label>
                    <input type="text" id="searchInput" class="search-input" placeholder="Nombre, email o teléfono...">
                </div>
            </div>
        </div>

        <div class="users-table-container" id="usersContainer">
            <div class="loading-container">
                <div class="loading-spinner"><i class="fas fa-spinner"></i></div>
                <p class="loading-text">Cargando usuarios...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from '../publico_general/supabaseClient.js';
        
        // Variables globales
        window.allUsers = [];
        window.allMemberships = [];
        window.currentPage = 1;
        window.rowsPerPage = 10;
        window.filteredUsers = [];
        window.currentUserId = null;
        
        // Función para obtener la clase CSS según el plan
        function getMembershipClass(planNombre) {
            if (!planNombre) return 'crossfit';
            const nombreLower = planNombre.toLowerCase();
            if (nombreLower.includes('crossfit')) return 'crossfit';
            if (nombreLower.includes('running')) return 'running';
            if (nombreLower.includes('premium')) return 'premium';
            if (nombreLower.includes('personalizado')) return 'personalizado';
            return 'crossfit';
        }
        
        // Inicialización
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log('🚀 INICIANDO CARGA DE USUARIOS...');
                
                const { data: { user }, error: authError } = await supabase.auth.getUser();
                if (authError || !user) {
                    console.error('❌ No autenticado');
                    window.location.href = 'login.html';
                    return;
                }
                
                window.currentUserId = user.id;
                console.log('✅ Usuario autenticado:', user.email);
                
                await window.cargarDatosCompletos();
                window.configurarFiltros();
                
            } catch (error) {
                console.error('❌ Error general:', error);
                window.mostrarError('Error al cargar la página: ' + error.message);
            }
        });
        
        // Cargar datos completos (CORREGIDO - usa plan_nombre)
        window.cargarDatosCompletos = async function() {
            try {
                window.mostrarNotificacion('🔄 Cargando usuarios...', 'info');
                
                // Cargar usuarios
                const { data: users, error: usersError } = await supabase
                    .rpc('obtener_todos_usuarios');
                
                if (usersError) {
                    const { data: fallbackUsers, error: fallbackError } = await supabase
                        .from('usuarios')
                        .select('*')
                        .order('created_at', { ascending: false });
                    
                    if (fallbackError) throw new Error(fallbackError.message);
                    window.allUsers = fallbackUsers || [];
                } else {
                    window.allUsers = users || [];
                }
                
                // Cargar membresías (NORMALIZANDO plan_nombre)
                const { data: memberships, error: membershipsError } = await supabase
                    .rpc('obtener_todas_membresias');
                
                if (membershipsError) {
                    const { data: fallbackMems } = await supabase
                        .from('membresias')
                        .select('*');
                    window.allMemberships = (fallbackMems || []).map(m => ({
                        ...m,
                        plan_nombre: m.plan_nombre || m.tipo || 'Sin plan'
                    }));
                } else {
                    window.allMemberships = (memberships || []).map(m => ({
                        ...m,
                        plan_nombre: m.plan_nombre || m.tipo || 'Sin plan'
                    }));
                }
                
                console.log(`✅ ${window.allUsers.length} usuarios, ${window.allMemberships.length} membresías`);
                
                window.actualizarEstadisticas();
                window.aplicarFiltros();
                window.mostrarNotificacion(`✅ ${window.allUsers.length} usuarios cargados`, 'success');
                
            } catch (error) {
                console.error('❌ Error:', error);
                window.mostrarError('Error cargando usuarios: ' + error.message);
            }
        };
        
        // Actualizar estadísticas
        window.actualizarEstadisticas = function() {
            document.getElementById('totalUsers').textContent = window.allUsers.length;
            document.getElementById('adminUsers').textContent = window.allUsers.filter(u => u.rol === 'admin').length;
            document.getElementById('entrenadorUsers').textContent = window.allUsers.filter(u => u.rol === 'entrenador').length;
            document.getElementById('activeMemberships').textContent = window.allMemberships.filter(m => m.estado === 'activo').length;
        };
        
        // Mostrar usuarios en tabla (CORREGIDO - usa plan_nombre)
        window.mostrarUsuarios = function(usuarios) {
            const container = document.getElementById('usersContainer');
            
            if (!usuarios || usuarios.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-user-slash"></i></div>
                        <h3 class="empty-text">No hay usuarios registrados</h3>
                        <button class="action-btn" onclick="window.cargarDatosCompletos()">
                            <i class="fas fa-sync-alt"></i> Reintentar
                        </button>
                    </div>
                `;
                return;
            }
            
            const totalPages = Math.ceil(usuarios.length / window.rowsPerPage);
            const startIndex = (window.currentPage - 1) * window.rowsPerPage;
            const endIndex = startIndex + window.rowsPerPage;
            const currentUsers = usuarios.slice(startIndex, endIndex);
            
            let html = `
                <div class="table-header">
                    <h3 class="table-title">
                        <i class="fas fa-users"></i>
                        Lista de Usuarios (${usuarios.length})
                    </h3>
                    <div class="table-actions">
                        <button class="table-btn" onclick="window.exportarCSV()">
                            <i class="fas fa-file-export"></i> Exportar
                        </button>
                        <button class="table-btn" onclick="window.refreshData()">
                            <i class="fas fa-sync-alt"></i> Actualizar
                        </button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>Usuario</th>
                                <th>Rol</th>
                                <th>Membresía</th>
                                <th>Estado</th>
                                <th>Fecha Registro</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            currentUsers.forEach(user => {
                const membership = window.allMemberships.find(m => m.id_usuario === user.id_usuario);
                const membershipStatus = membership?.estado || 'inactivo';
                const planNombre = membership?.plan_nombre || 'Sin membresía';
                const membershipClass = getMembershipClass(planNombre);
                
                let formattedDate = 'Sin fecha';
                try {
                    if (user.created_at) {
                        formattedDate = new Date(user.created_at).toLocaleDateString('es-ES', {
                            day: 'numeric', month: 'short', year: 'numeric'
                        });
                    }
                } catch (e) {}
                
                html += `
                    <tr data-id="${user.id_usuario}">
                        <td>
                            <div class="user-name-cell">${user.nombre || ''} ${user.apellido || ''}</div>
                            <div style="color: #aaa; font-size: 0.85rem; margin-top: 5px;">
                                ${user.correo || ''}
                                ${user.telefono ? `<br>📱 ${user.telefono}` : ''}
                            </div>
                        </td>
                        <td>
                            <div class="role-badge role-${user.rol || 'usuario'}">
                                <i class="${window.getRoleIcon(user.rol)}"></i>
                                ${user.rol || 'usuario'}
                            </div>
                        </td>
                        <td>
                            ${membership ? `
                                <div class="membership-badge membership-${membershipClass}">
                                    <i class="fas fa-id-card"></i>
                                    ${planNombre}
                                </div>
                            ` : '<span style="color: #888;">Sin membresía</span>'}
                        </td>
                        <td>
                            <div class="status-badge status-${membershipStatus}">
                                <i class="fas fa-circle" style="font-size: 0.5rem;"></i>
                                ${membershipStatus}
                            </div>
                        </td>
                        <td class="date-cell">${formattedDate}</td>
                        <td class="actions-cell">
                            <button class="action-icon-btn view-btn" onclick="window.verUsuario('${user.id_usuario}')" title="Ver detalles">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="action-icon-btn edit-btn" onclick="window.editarUsuario('${user.id_usuario}')" title="Editar">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-icon-btn delete-btn" onclick="window.eliminarUsuario('${user.id_usuario}', '${user.nombre} ${user.apellido}')" title="Eliminar">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            html += `</tbody>`;
            html += `</table></div>`;
            
            if (totalPages > 1) {
                html += `
                    <div class="pagination">
                        <button class="pagination-btn" onclick="window.cambiarPagina(${window.currentPage - 1})" 
                            ${window.currentPage === 1 ? 'disabled' : ''}>
                            <i class="fas fa-chevron-left"></i> Anterior
                        </button>
                        <div class="page-info">Página ${window.currentPage} de ${totalPages}</div>
                        <button class="pagination-btn" onclick="window.cambiarPagina(${window.currentPage + 1})"
                            ${window.currentPage === totalPages ? 'disabled' : ''}>
                            Siguiente <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        };
        
        window.getRoleIcon = function(rol) {
            switch(rol) {
                case 'admin': return 'fas fa-user-shield';
                case 'entrenador': return 'fas fa-dumbbell';
                default: return 'fas fa-user';
            }
        };
        
        window.aplicarFiltros = function() {
            const roleFilter = document.getElementById('filterRole')?.value || 'all';
            const statusFilter = document.getElementById('filterStatus')?.value || 'all';
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            
            window.currentPage = 1;
            let filtered = [...window.allUsers];
            
            if (roleFilter !== 'all') {
                filtered = filtered.filter(u => u.rol === roleFilter);
            }
            
            if (statusFilter !== 'all') {
                filtered = filtered.filter(user => {
                    const membership = window.allMemberships.find(m => m.id_usuario === user.id_usuario);
                    return membership?.estado === statusFilter;
                });
            }
            
            if (searchTerm) {
                filtered = filtered.filter(user => 
                    (user.nombre?.toLowerCase().includes(searchTerm)) ||
                    (user.apellido?.toLowerCase().includes(searchTerm)) ||
                    (user.correo?.toLowerCase().includes(searchTerm)) ||
                    (user.telefono?.includes(searchTerm))
                );
            }
            
            window.filteredUsers = filtered;
            window.mostrarUsuarios(filtered);
        };
        
        window.configurarFiltros = function() {
            document.getElementById('filterRole')?.addEventListener('change', window.aplicarFiltros);
            document.getElementById('filterStatus')?.addEventListener('change', window.aplicarFiltros);
            document.getElementById('searchInput')?.addEventListener('input', window.aplicarFiltros);
        };
        
        window.cambiarPagina = function(page) {
            if (page < 1 || page > Math.ceil(window.filteredUsers.length / window.rowsPerPage)) return;
            window.currentPage = page;
            window.mostrarUsuarios(window.filteredUsers);
        };
        
        window.refreshData = async function() {
            await window.cargarDatosCompletos();
        };
        
        // VER USUARIO - Modal con detalles (CORREGIDO - usa plan_nombre)
        window.verUsuario = async function(userId) {
            try {
                const user = window.allUsers.find(u => u.id_usuario === userId);
                const membership = window.allMemberships.find(m => m.id_usuario === userId);
                const membershipClass = getMembershipClass(membership?.plan_nombre);
                
                if (!user) {
                    window.mostrarNotificacion('Usuario no encontrado', 'error');
                    return;
                }
                
                const modalHTML = `
                    <div class="user-modal-overlay" id="userModal" onclick="window.cerrarModalSiClickFuera(event)">
                        <div class="user-modal-container">
                            <button class="modal-close-btn" onclick="window.cerrarModal()"><i class="fas fa-times"></i></button>
                            <div class="modal-header">
                                <div class="user-avatar">
                                    ${user.nombre?.charAt(0) || 'U'}${user.apellido?.charAt(0) || ''}
                                </div>
                                <div class="user-header-info">
                                    <h2 class="modal-title">${user.nombre || ''} ${user.apellido || ''}</h2>
                                    <p><i class="fas fa-envelope"></i> ${user.correo || 'Sin email'}</p>
                                    <p><i class="fas fa-phone"></i> ${user.telefono || 'Sin teléfono'}</p>
                                </div>
                            </div>
                            <div class="modal-tabs">
                                <button class="tab-btn active" onclick="window.cambiarTab('info')"><i class="fas fa-info-circle"></i> Información</button>
                                <button class="tab-btn" onclick="window.cambiarTab('membership')"><i class="fas fa-id-card"></i> Membresía</button>
                                <button class="tab-btn" onclick="window.cargarRutinasUsuario('${userId}')"><i class="fas fa-dumbbell"></i> Rutinas</button>
                            </div>
                            <div id="tab-info" class="tab-content">
                                <div class="info-grid">
                                    <div class="info-item"><div class="info-label"><i class="fas fa-user-tag"></i> Rol</div><div class="info-value"><span class="role-badge role-${user.rol || 'usuario'}">${user.rol || 'usuario'}</span></div></div>
                                    <div class="info-item"><div class="info-label"><i class="fas fa-venus-mars"></i> Género</div><div class="info-value">${user.genero || 'No especificado'}</div></div>
                                    <div class="info-item"><div class="info-label"><i class="fas fa-weight-scale"></i> Peso</div><div class="info-value">${user.peso ? user.peso + ' kg' : 'No registrado'}</div></div>
                                    <div class="info-item"><div class="info-label"><i class="fas fa-ruler"></i> Estatura</div><div class="info-value">${user.estatura ? user.estatura + ' cm' : 'No registrado'}</div></div>
                                    <div class="info-item"><div class="info-label"><i class="fas fa-calendar-alt"></i> Fecha Registro</div><div class="info-value">${user.created_at ? new Date(user.created_at).toLocaleDateString('es-ES') : 'N/A'}</div></div>
                                </div>
                            </div>
                            <div id="tab-membership" class="tab-content" style="display: none;">
                                ${membership ? `
                                    <div class="membership-details">
                                        <div class="membership-header">
                                            <h3><i class="fas fa-id-card"></i> ${membership.plan_nombre || 'Plan'}</h3>
                                            <span class="status-badge status-${membership.estado || 'inactivo'}">${membership.estado || 'inactivo'}</span>
                                        </div>
                                        <div class="info-grid">
                                            <div class="info-item"><div class="info-label"><i class="fas fa-calendar-check"></i> Fecha Inscripción</div><div class="info-value">${membership.fecha_inscrito ? new Date(membership.fecha_inscrito).toLocaleDateString('es-ES') : 'N/A'}</div></div>
                                            <div class="info-item"><div class="info-label"><i class="fas fa-hourglass-half"></i> Próximo Pago</div><div class="info-value">${membership.fecha_siguiente_pago ? new Date(membership.fecha_siguiente_pago).toLocaleDateString('es-ES') : 'N/A'}</div></div>
                                            <div class="info-item"><div class="info-label"><i class="fas fa-clock"></i> Expiración</div><div class="info-value">${membership.fecha_expiracion ? new Date(membership.fecha_expiracion).toLocaleDateString('es-ES') : 'N/A'}</div></div>
                                        </div>
                                    </div>
                                ` : `<div class="no-membership"><i class="fas fa-exclamation-triangle"></i><p>Este usuario no tiene membresía activa</p></div>`}
                            </div>
                            <div id="tab-rutinas" class="tab-content" style="display: none;">
                                <div class="loading-container" style="padding: 20px;"><div class="loading-spinner" style="font-size: 2rem;"><i class="fas fa-spinner"></i></div><p>Cargando rutinas...</p></div>
                            </div>
                            <div class="modal-actions">
                                <button class="modal-btn edit-btn" onclick="window.editarUsuario('${userId}')"><i class="fas fa-edit"></i> Editar Usuario</button>
                                <button class="modal-btn delete-btn" onclick="window.eliminarUsuarioDesdeModal('${userId}', '${user.nombre} ${user.apellido}')"><i class="fas fa-trash"></i> Eliminar Usuario</button>
                                <button class="modal-btn close-btn" onclick="window.cerrarModal()"><i class="fas fa-times"></i> Cerrar</button>
                            </div>
                        </div>
                    </div>
                `;
                
                document.body.insertAdjacentHTML('beforeend', modalHTML);
                
            } catch (error) {
                console.error('Error:', error);
                window.mostrarNotificacion('Error al cargar detalles', 'error');
            }
        };
        
        window.cambiarTab = function(tab) {
            document.getElementById('tab-info').style.display = 'none';
            document.getElementById('tab-membership').style.display = 'none';
            const tabRutinas = document.getElementById('tab-rutinas');
            if (tabRutinas) tabRutinas.style.display = 'none';
            document.getElementById(`tab-${tab}`).style.display = 'block';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        };
        
        window.cargarRutinasUsuario = async function(userId) {
            try {
                const tabRutinas = document.getElementById('tab-rutinas');
                tabRutinas.innerHTML = '<div class="loading-container"><div class="loading-spinner"><i class="fas fa-spinner"></i></div><p>Cargando rutinas...</p></div>';
                
                const { data: rutinas, error } = await supabase
                    .from('rutinas')
                    .select('cod_rutina, nombre_rutina, tipo, fecha_inicio, instrucciones')
                    .eq('creado_por', userId)
                    .order('fecha_inicio', { ascending: false });
                
                if (error) throw error;
                
                if (!rutinas || rutinas.length === 0) {
                    tabRutinas.innerHTML = `<div class="no-routines"><i class="fas fa-dumbbell"></i><p>Este usuario no ha creado ninguna rutina</p></div>`;
                    return;
                }
                
                let html = '<div class="routines-list"><h3><i class="fas fa-list"></i> Rutinas Creadas</h3>';
                rutinas.forEach(r => {
                    html += `<div class="routine-item"><div class="routine-header"><strong>${r.nombre_rutina}</strong><span class="type-badge">${r.tipo || 'General'}</span></div><div class="routine-info"><small><i class="fas fa-calendar"></i> ${new Date(r.fecha_inicio).toLocaleDateString('es-ES')}</small></div><div class="routine-preview">${(r.instrucciones || '').substring(0, 100)}...</div></div>`;
                });
                html += '</div>';
                tabRutinas.innerHTML = html;
                
            } catch (error) {
                document.getElementById('tab-rutinas').innerHTML = `<div class="error-state"><i class="fas fa-exclamation-triangle"></i><p>Error al cargar rutinas</p></div>`;
            }
        };
        
        window.cerrarModal = function() {
            const modal = document.getElementById('userModal');
            if (modal) modal.remove();
        };
        
        window.cerrarModalSiClickFuera = function(event) {
            if (event.target === event.currentTarget) window.cerrarModal();
        };
        
        // EDITAR USUARIO
        window.editarUsuario = function(userId) {
            window.location.href = `edit-user.html?id=${userId}`;
        };
        
        // ELIMINAR USUARIO (desde la tabla)
        window.eliminarUsuario = async function(userId, nombreCompleto) {
            const confirmar = confirm(`¿Estás seguro de eliminar al usuario "${nombreCompleto}"?\n\nEsta acción eliminará también:\n- Su membresía\n- Sus pagos\n- Sus rutinas creadas\n\nEsta acción NO se puede deshacer.`);
            if (!confirmar) return;
            
            try {
                window.mostrarNotificacion('🔄 Eliminando usuario...', 'info');
                
                await supabase.from('pagos').delete().eq('id_usuario', userId);
                await supabase.from('membresias').delete().eq('id_usuario', userId);
                await supabase.from('rutinas').delete().eq('creado_por', userId);
                
                const { error } = await supabase.from('usuarios').delete().eq('id_usuario', userId);
                if (error) throw error;
                
                window.mostrarNotificacion('✅ Usuario eliminado correctamente', 'success');
                await window.cargarDatosCompletos();
                
            } catch (error) {
                console.error('Error:', error);
                window.mostrarNotificacion('❌ Error al eliminar usuario: ' + error.message, 'error');
            }
        };
        
        // ELIMINAR USUARIO (desde el modal)
        window.eliminarUsuarioDesdeModal = async function(userId, nombreCompleto) {
            window.cerrarModal();
            
            const confirmar = confirm(`¿Estás seguro de eliminar al usuario "${nombreCompleto}"?\n\nEsta acción eliminará también:\n- Su membresía\n- Sus pagos\n- Sus rutinas creadas\n\nEsta acción NO se puede deshacer.`);
            if (!confirmar) return;
            
            try {
                window.mostrarNotificacion('🔄 Eliminando usuario...', 'info');
                
                await supabase.from('pagos').delete().eq('id_usuario', userId);
                await supabase.from('membresias').delete().eq('id_usuario', userId);
                await supabase.from('rutinas').delete().eq('creado_por', userId);
                
                const { error } = await supabase.from('usuarios').delete().eq('id_usuario', userId);
                if (error) throw error;
                
                window.mostrarNotificacion('✅ Usuario eliminado correctamente', 'success');
                await window.cargarDatosCompletos();
                
            } catch (error) {
                window.mostrarNotificacion('❌ Error al eliminar usuario: ' + error.message, 'error');
            }
        };
        
        // Exportar CSV
        window.exportarCSV = function() {
            if (window.filteredUsers.length === 0) {
                window.mostrarNotificacion('No hay datos para exportar', 'error');
                return;
            }
            
            let csv = 'Nombre,Apellido,Email,Rol,Estado Membresía,Plan,Fecha Registro\n';
            window.filteredUsers.forEach(user => {
                const membership = window.allMemberships.find(m => m.id_usuario === user.id_usuario);
                const estado = membership?.estado || 'sin membresía';
                const plan = membership?.plan_nombre || 'Sin plan';
                csv += `"${user.nombre || ''}","${user.apellido || ''}","${user.correo || ''}","${user.rol || 'usuario'}","${estado}","${plan}","${user.created_at || ''}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `usuarios_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            
            window.mostrarNotificacion('📊 CSV exportado correctamente', 'success');
        };
        
        // Notificaciones visuales
        window.mostrarNotificacion = function(mensaje, tipo) {
            const existingNotif = document.querySelector('.notification');
            if (existingNotif) existingNotif.remove();
            
            const notification = document.createElement('div');
            notification.className = `notification ${tipo}`;
            notification.innerHTML = `<i class="fas ${tipo === 'success' ? 'fa-check-circle' : tipo === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${mensaje}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        };
        
        window.mostrarError = function(mensaje) {
            const container = document.getElementById('usersContainer');
            if (container) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><i class="fas fa-exclamation-triangle" style="color: #ff4444;"></i></div>
                        <h3 class="empty-text">${mensaje}</h3>
                        <button class="action-btn" onclick="window.cargarDatosCompletos()"><i class="fas fa-redo"></i> Reintentar</button>
                    </div>
                `;
            }
        };
        
        // Exponer funciones globalmente
        window.cargarDatosCompletos = window.cargarDatosCompletos;
        window.refreshData = window.refreshData;
        window.aplicarFiltros = window.aplicarFiltros;
        window.cambiarPagina = window.cambiarPagina;
        window.verUsuario = window.verUsuario;
        window.editarUsuario = window.editarUsuario;
        window.eliminarUsuario = window.eliminarUsuario;
        window.eliminarUsuarioDesdeModal = window.eliminarUsuarioDesdeModal;
        window.exportarCSV = window.exportarCSV;
        
    </script>
</body>
</html>
