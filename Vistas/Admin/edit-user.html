<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Editar Usuario - Jean Trainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 1000;
            top: 0;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
        }

        .navbar {
            height: 70px;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo a {
            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            background-color: #FFD700;
            color: #000;
            border: none;
            border-radius: 50px;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background-color: #FFC400;
            transform: scale(1.05);
        }

        .main-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px 50px;
        }

        .page-title {
            font-size: 2rem;
            color: #FFD700;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #FFD700;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #FFD700;
        }

        .form-group input:disabled, .form-group input.readonly {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            cursor: not-allowed;
            border-color: rgba(255, 215, 0, 0.3);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .actions-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-primary {
            background: #FFD700;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 12px 25px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #FFD700;
            border: 1px solid #FFD700;
            border-radius: 8px;
            padding: 12px 25px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover, .btn-secondary:hover {
            transform: translateY(-2px);
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4CAF50;
            color: #4CAF50;
            display: block;
        }

        .message.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #F44336;
            color: #F44336;
            display: block;
        }

        .message.info {
            background: rgba(33, 150, 243, 0.2);
            border: 1px solid #2196F3;
            color: #2196F3;
            display: block;
        }

        .info-note {
            background: rgba(255, 215, 0, 0.1);
            border-left: 4px solid #FFD700;
            padding: 10px 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #ccc;
        }

        .info-note i {
            color: #FFD700;
            margin-right: 8px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .actions-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo"><a href="../publico_general/dashboard_admin.html"><i class="fas fa-dumbbell"></i>Athlex</a></div>
            <button class="back-btn" onclick="window.location.href='view-user.html'"><i class="fas fa-arrow-left"></i> Volver</button>
        </div>
    </header>

    <main class="main-content">
        <h1 class="page-title">EDITAR USUARIO</h1>
        <div class="form-container">
            <div id="message" class="message"></div>
            
            <div class="info-note">
                <i class="fas fa-info-circle"></i> La cédula es un dato único y no se puede modificar por seguridad.
            </div>
            
            <form id="editUserForm">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nombre *</label>
                        <input type="text" id="nombre" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Apellido *</label>
                        <input type="text" id="apellido" required>
                    </div>
                </div>

                <!-- CAMPO CÉDULA - SOLO LECTURA (NO SE PUEDE EDITAR) -->
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Cédula</label>
                    <input type="text" id="cedula" class="readonly" readonly disabled>
                    <small style="color: #aaa;">La cédula no se puede modificar (identificador único)</small>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Correo Electrónico *</label>
                    <input type="email" id="correo" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Teléfono</label>
                    <input type="tel" id="telefono">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> Rol</label>
                    <select id="rol">
                        <option value="usuario">Usuario</option>
                        <option value="entrenador">Entrenador</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-venus-mars"></i> Género</label>
                    <select id="genero">
                        <option value="">Seleccionar</option>
                        <option value="masculino">Masculino</option>
                        <option value="femenino">Femenino</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-weight-scale"></i> Peso (kg)</label>
                        <input type="number" id="peso" step="0.1" min="30" max="300">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-ruler"></i> Estatura (cm)</label>
                        <input type="number" id="estatura" step="0.1" min="100" max="250">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Fecha de Registro</label>
                    <input type="text" id="created_at" disabled style="background: rgba(255,255,255,0.05);">
                </div>

                <div class="actions-container">
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Guardar Cambios</button>
                    <button type="button" class="btn-secondary" onclick="window.location.href='view-user.html'"><i class="fas fa-times"></i> Cancelar</button>
                </div>
            </form>
        </div>
    </main>

    <script type="module">
        import { supabase } from '../publico_general/supabaseClient.js';
        
        let userId = null;
        
        document.addEventListener('DOMContentLoaded', async function() {
            // Obtener ID de la URL
            const urlParams = new URLSearchParams(window.location.search);
            userId = urlParams.get('id');
            
            if (!userId) {
                mostrarMensaje('No se especificó ningún usuario', 'error');
                return;
            }
            
            await cargarUsuario();
        });
        
        async function cargarUsuario() {
            try {
                mostrarMensaje('Cargando datos del usuario...', 'info');
                
                // Consulta directa a la tabla usuarios
                const { data: user, error } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('id_usuario', userId)
                    .single();
                
                if (error) {
                    console.error('Error en consulta:', error);
                    throw error;
                }
                
                if (!user) {
                    mostrarMensaje('Usuario no encontrado', 'error');
                    return;
                }
                
                console.log('Usuario cargado:', user);
                
                // Llenar formulario
                document.getElementById('nombre').value = user.nombre || '';
                document.getElementById('apellido').value = user.apellido || '';
                
                // MOSTRAR CÉDULA (campo de solo lectura)
                document.getElementById('cedula').value = user.cedula || 'No registrada';
                
                document.getElementById('correo').value = user.correo || '';
                document.getElementById('telefono').value = user.telefono || '';
                document.getElementById('rol').value = user.rol || 'usuario';
                document.getElementById('genero').value = user.genero || '';
                document.getElementById('peso').value = user.peso || '';
                document.getElementById('estatura').value = user.estatura || '';
                
                // Mostrar fecha de registro (solo lectura)
                if (user.created_at) {
                    const fecha = new Date(user.created_at).toLocaleDateString('es-ES', {
                        day: 'numeric',
                        month: 'long',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    document.getElementById('created_at').value = fecha;
                }
                
                mostrarMensaje('✅ Datos cargados correctamente', 'success');
                
            } catch (error) {
                console.error('Error cargando usuario:', error);
                mostrarMensaje('Error al cargar los datos del usuario: ' + error.message, 'error');
            }
        }
        
        document.getElementById('editUserForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const updates = {
                nombre: document.getElementById('nombre').value.trim(),
                apellido: document.getElementById('apellido').value.trim(),
                // NOTA: NO incluimos cedula aquí porque no se puede modificar
                correo: document.getElementById('correo').value.trim(),
                telefono: document.getElementById('telefono').value.trim() || null,
                rol: document.getElementById('rol').value,
                genero: document.getElementById('genero').value || null,
                peso: document.getElementById('peso').value ? parseFloat(document.getElementById('peso').value) : null,
                estatura: document.getElementById('estatura').value ? parseFloat(document.getElementById('estatura').value) : null,
                updated_at: new Date()
            };
            
            // Validar campos requeridos
            if (!updates.nombre || !updates.apellido || !updates.correo) {
                mostrarMensaje('Nombre, apellido y correo son obligatorios', 'error');
                return;
            }
            
            // Validar formato de email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(updates.correo)) {
                mostrarMensaje('El correo electrónico no es válido', 'error');
                return;
            }
            
            try {
                mostrarMensaje('Guardando cambios...', 'info');
                
                const { error } = await supabase
                    .from('usuarios')
                    .update(updates)
                    .eq('id_usuario', userId);
                
                if (error) throw error;
                
                mostrarMensaje('✅ Usuario actualizado correctamente', 'success');
                
                setTimeout(() => {
                    window.location.href = 'view-user.html';
                }, 1500);
                
            } catch (error) {
                console.error('Error actualizando:', error);
                mostrarMensaje('Error al actualizar: ' + error.message, 'error');
            }
        });
        
        function mostrarMensaje(mensaje, tipo) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = mensaje;
            msgDiv.className = `message ${tipo}`;
            
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
